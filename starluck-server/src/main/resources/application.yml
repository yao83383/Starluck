server:
  port: 8090

spring:
  profiles:
    active: dev
  application:
    name: starluck-server

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: Starluck-YiQingYouRen-2026-SecretKey-ForJWT
  expiration: 604800000

# 应用配置
app:
  # 钻石兑换比例：1元 = 10钻石
  diamond-rate: 10
  # 提现兑换比例：10钻石 = 0.6元
  withdraw-rate: 0.06
  # 提现手续费率
  withdraw-fee-rate: 0.006
  # 聊天单价（钻石/条）
  chat-price: 1
  # VIP每日免费聊天数
  vip-daily-free-chat: 100
  # 视频通话单价（钻石/分钟）
  call-price-per-minute: 6
  # 上传路径
  upload-path: ./uploads
