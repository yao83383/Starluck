server:
  port: 8080

spring:
  application:
    name: starluck-server
  profiles:
    active: prod

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: jdbc:mysql://mysql:3306/starluck?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: starluck
      password: ${MYSQL_PASSWORD:starluck123}
      driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:Starluck-YiQingYouRen-2026-SecretKey-ForJWT-Prod}
  expiration: 604800000

app:
  upload-path: /data/uploads
  diamond-rate: 10
  withdraw-rate: 0.06
