server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: jdbc:mysql://mysql:3306/starluck?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=false&cachePrepStmts=false
      username: starluck
      password: ${MYSQL_PASSWORD:starluck123}
      driver-class-name: com.mysql.cj.jdbc.Driver
      # 强制每条连接 SET NAMES utf8mb4
      connection-init-sqls:
        - SET NAMES utf8mb4

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:Starluck-YiQingYouRen-2026-SecretKey-ForJWT-Prod}
  expiration: 604800000

app:
  upload-path: /data/uploads
  diamond-rate: 100
  withdraw-rate: 0.06
  chat-price: 30
  vip-daily-free-chat: 100
  withdraw-fee-rate: 0.006

# 智谱 GLM AI 配置（生产环境通过 docker-compose 注入 GLM_API_KEY）
glm:
  api-key: ${GLM_API_KEY:}
  model: glm-4-flash
  api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
  max-tokens: 100
  temperature: 0.9
