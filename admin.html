<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280" />
<title>Starluck · 运营后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6fa;color:#2d2d3a;font-size:13px;line-height:1.5;height:100vh;overflow:hidden;}
button{border:none;outline:none;background:none;font-family:inherit;cursor:pointer;}
input,textarea,select{border:none;outline:none;font-family:inherit;background:none;}
a{text-decoration:none;color:inherit;}

/* === 整体布局 === */
.layout{display:grid;grid-template-columns:200px 1fr;height:100vh;}
.sidebar{background:linear-gradient(180deg,#1e1a3a,#2a1f4a);color:#fff;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar .logo{padding:18px 20px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#a18cff,#ff8ad4);-webkit-background-clip:text;background-clip:text;color:transparent;display:flex;align-items:center;gap:8px;}
.sidebar .logo .ic{font-size:24px;background:none;-webkit-text-fill-color:initial;}
.sidebar .nav{flex:1;padding:8px 0;}
.sidebar .nav-item{padding:10px 20px;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.75);font-size:14px;cursor:pointer;border-left:3px solid transparent;}
.sidebar .nav-item:hover{background:rgba(255,255,255,.05);}
.sidebar .nav-item.active{background:rgba(161,140,255,.15);color:#a18cff;border-left-color:#a18cff;font-weight:600;}
.sidebar .nav-item .ic{font-size:16px;}
.sidebar .nav-item .bd{margin-left:auto;background:#ff5c8a;color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;}
.sidebar .footer{padding:14px 20px;font-size:11px;color:rgba(255,255,255,.4);border-top:1px solid rgba(255,255,255,.06);}

.main{overflow:hidden;display:flex;flex-direction:column;}
.header{height:54px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;padding:0 24px;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.02);flex-shrink:0;}
.header .title{font-size:17px;font-weight:700;}
.header .right{display:flex;align-items:center;gap:14px;font-size:12px;color:#666;}
.header .right .dot{display:inline-flex;align-items:center;gap:5px;}
.header .right .dot::before{content:"";width:7px;height:7px;background:#5eead4;border-radius:50%;display:inline-block;}
.header .right .dot.off::before{background:#ccc;}
.content{flex:1;overflow-y:auto;padding:18px 24px;background:#f5f6fa;}

/* === 通用控件 === */
.btn{display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:500;background:linear-gradient(135deg,#a18cff,#ff8ad4);color:#fff;transition:opacity .15s;gap:4px;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn.ghost{background:#fff;color:#666;border:1px solid #ddd;}
.btn.ghost:hover{border-color:#a18cff;color:#a18cff;background:#fff;}
.btn.danger{background:#ff5c8a;}
.btn.gold{background:linear-gradient(135deg,#ffd966,#ff9a3c);color:#5a3a00;}
.btn.small{height:26px;padding:0 10px;font-size:12px;}
.btn.tiny{height:22px;padding:0 8px;font-size:11px;border-radius:4px;}

.input{display:block;width:100%;height:32px;padding:0 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;color:#2d2d3a;background:#fff;}
.input:focus{border-color:#a18cff;}
textarea.input{height:auto;padding:8px 10px;resize:vertical;font-family:inherit;line-height:1.5;}

.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:16px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

.tag{display:inline-flex;align-items:center;padding:2px 8px;font-size:11px;border-radius:4px;background:#f0f0f5;color:#666;}
.tag.green{background:#dcfce7;color:#15803d;}
.tag.red{background:#fee2e2;color:#dc2626;}
.tag.gold{background:#fef3c7;color:#b45309;}
.tag.purple{background:#ede9fe;color:#7c3aed;}
.tag.pink{background:#fce7f3;color:#be185d;}

.av{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:14px;}
.av-1{background:linear-gradient(135deg,#a18cff,#ff8ad4);}
.av-2{background:linear-gradient(135deg,#7ab5ff,#5eead4);}
.av-3{background:linear-gradient(135deg,#ffd966,#ff9a3c);}
.av-4{background:linear-gradient(135deg,#ff5c8a,#ffd966);}
.av-5{background:linear-gradient(135deg,#5eead4,#7ab5ff);}
.av-6{background:linear-gradient(135deg,#ff8ad4,#a18cff);}
.av-7{background:linear-gradient(135deg,#ff9a3c,#ff5c8a);}
.av-8{background:linear-gradient(135deg,#7ab5ff,#a18cff);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;background:#fafafd;font-weight:600;color:#666;font-size:12px;border-bottom:1px solid #eee;}
td{padding:10px 12px;border-bottom:1px solid #f5f5f8;vertical-align:middle;}
tr:hover td{background:#fafafd;}

/* === 数据看板 === */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.kpi-card{background:#fff;border-radius:8px;padding:16px;position:relative;overflow:hidden;}
.kpi-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#a18cff,#ff8ad4);}
.kpi-card .l{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;}
.kpi-card .v{font-size:28px;font-weight:800;color:#2d2d3a;margin-top:6px;}
.kpi-card .d{font-size:11px;color:#888;margin-top:4px;}
.kpi-card .d .up{color:#5eead4;}
.kpi-card .d .down{color:#ef4444;}

.funnel{display:flex;align-items:flex-end;gap:0;height:160px;padding:14px 0;}
.funnel .fn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
.funnel .fn .bar{width:80%;background:linear-gradient(180deg,#a18cff,#ff8ad4);border-radius:6px 6px 0 0;display:flex;align-items:flex-start;justify-content:center;color:#fff;font-weight:700;padding-top:8px;}
.funnel .fn .nm{font-size:12px;color:#666;}
.funnel .fn .v{font-size:11px;color:#888;}
.funnel .fn::after{content:"›";position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:24px;color:#ccc;}
.funnel .fn:last-child::after{display:none;}

/* === 假用户管理 === */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
.toolbar .left{display:flex;align-items:center;gap:8px;}
.toolbar .left .input{width:240px;}
.toolbar .right{display:flex;gap:8px;}

/* === 客服工作台 === */
.cs-layout{display:grid;grid-template-columns:280px 1fr 320px;gap:14px;height:calc(100vh - 54px - 36px);}
.cs-col{background:#fff;border-radius:8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.cs-col-head{padding:12px 14px;border-bottom:1px solid #eee;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.cs-col-body{flex:1;overflow-y:auto;}

.conv-item{padding:12px 14px;display:flex;gap:10px;cursor:pointer;border-bottom:1px solid #f5f5f8;}
.conv-item:hover{background:#fafafd;}
.conv-item.active{background:#fef0f5;border-left:3px solid #a18cff;padding-left:11px;}
.conv-item .iv{flex:1;min-width:0;}
.conv-item .iv .nm{display:flex;justify-content:space-between;align-items:center;}
.conv-item .iv .nm .n{font-size:13px;font-weight:600;}
.conv-item .iv .nm .t{font-size:10px;color:#999;}
.conv-item .iv .ln{font-size:11px;color:#888;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.conv-item .iv .as{font-size:10px;color:#7c3aed;margin-top:3px;}
.conv-item .bd{background:#ff5c8a;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;}

.cs-chat{display:flex;flex-direction:column;}
.cs-chat-head{padding:12px 14px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cs-chat-head .iv{flex:1;}
.cs-chat-head .iv .n{font-size:14px;font-weight:700;}
.cs-chat-head .iv .m{font-size:11px;color:#888;}
.cs-msg-flow{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#fafafd;}
.cs-sys{font-size:11px;color:#999;text-align:center;padding:6px;}
.cs-bubble-row{display:flex;gap:8px;max-width:75%;align-items:flex-end;}
.cs-bubble-row.fake{align-self:flex-end;flex-direction:row-reverse;}
.cs-bubble-row .av{width:30px;height:30px;font-size:12px;}
.cs-bubble{padding:8px 12px;border-radius:12px;background:#fff;font-size:13px;line-height:1.4;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.cs-bubble-row.fake .cs-bubble{background:linear-gradient(135deg,#a18cff,#ff8ad4);color:#fff;}
.cs-bubble-row .meta{font-size:9px;color:#bbb;margin-top:3px;}
.cs-input-bar{padding:12px 14px;border-top:1px solid #eee;background:#fff;flex-shrink:0;}
.cs-input-row{display:flex;gap:8px;}
.cs-input-row textarea{flex:1;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:13px;height:60px;resize:none;font-family:inherit;}
.cs-input-row textarea:focus{border-color:#a18cff;}
.cs-quick-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.cs-quick-row .q{padding:3px 10px;background:#f5f5f8;border-radius:12px;font-size:11px;color:#666;cursor:pointer;}
.cs-quick-row .q:hover{background:#fef0f5;color:#a18cff;}

.cs-side-section{padding:12px 14px;border-bottom:1px solid #eee;}
.cs-side-section h4{font-size:12px;color:#888;font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.cs-profile{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cs-profile .iv{flex:1;}
.cs-profile .iv .n{font-size:14px;font-weight:700;}
.cs-profile .iv .m{font-size:11px;color:#888;}
.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;}
.profile-stats .ps{background:#fafafd;padding:6px 8px;border-radius:6px;}
.profile-stats .ps .l{color:#888;}
.profile-stats .ps .v{font-weight:700;color:#2d2d3a;margin-top:2px;}

.ai-suggest{background:linear-gradient(135deg,rgba(255,215,94,.15),rgba(255,154,60,.05));border:1px solid rgba(255,154,60,.3);border-radius:8px;padding:10px;font-size:12px;}
.ai-suggest .hd{font-size:11px;color:#ff9a3c;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.ai-suggest .tx{font-size:13px;color:#2d2d3a;margin:6px 0;min-height:36px;line-height:1.5;}
.ai-suggest .act{display:flex;gap:6px;}

/* === 推送规则 === */
.slot-row{display:grid;grid-template-columns:auto 1fr 1fr 1fr auto;gap:10px;align-items:center;padding:10px;border-radius:6px;background:#fafafd;margin-bottom:8px;}
.slot-row label{font-size:11px;color:#888;}
.slot-row .input{height:28px;font-size:12px;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-card{background:#fff;border-radius:8px;width:520px;max-width:90vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-head{padding:14px 18px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
.modal-head .t{font-size:15px;font-weight:700;}
.modal-head .x{font-size:20px;color:#999;cursor:pointer;}
.modal-body{padding:18px;overflow-y:auto;flex:1;}
.modal-foot{padding:12px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;}

.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500;}

.toast{position:fixed;top:24px;right:24px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:9999;animation:slideIn .25s;}
.modal-overlay{position:fixed;inset:0;background:rgba(10,4,24,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-overlay .modal{background:rgba(180,140,255,0.08);border:1px solid rgba(180,140,255,0.2);border-radius:14px;padding:24px;max-width:90vw;box-shadow:0 8px 32px rgba(10,4,24,0.5);}
@keyframes slideIn{from{transform:translateX(120%);}to{transform:translateX(0);}}

.empty{padding:60px 20px;text-align:center;color:#bbb;font-size:13px;}
.empty .ei{font-size:48px;opacity:.5;margin-bottom:14px;}

.sw{width:38px;height:22px;background:#e5e5ec;border-radius:11px;position:relative;transition:background .2s;display:inline-block;cursor:pointer;vertical-align:middle;}
.sw.on{background:#a18cff;}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.sw.on::after{transform:translateX(16px);}

.log-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f8;font-size:12px;align-items:center;}
.log-row .t{color:#888;font-family:monospace;}
.log-row .av{width:24px;height:24px;font-size:10px;}
.log-row .a{flex:1;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"></script>
<script src="api.js"></script>
<script>
const { createApp, reactive, ref, computed, watch, onMounted, nextTick } = Vue

/* ===================== 后端API开关 =====================
 * true  => 假用户管理、批量生成、推送等优先走后端API
 * false => 仅本地 localStorage Mock
 * 调用失败时降级到本地，保证后台仍可用。
 */
const USE_BACKEND = true
const API = (typeof window !== 'undefined' && window.starluckApi) ? window.starluckApi : null
const apiOn = ()=> USE_BACKEND && API

/* ===================== 后台登录状态 ===================== */
const adminAuth = reactive({
  token: localStorage.getItem('starluck_token') || '',
  phone: '',
  role: '',
  loggedIn: false,
})
try{
  const at = adminAuth.token
  if(at){
    API.auth.getUserInfo().then(data => {
      adminAuth.loggedIn = true
      adminAuth.phone = data.phone || ''
      adminAuth.role = data.role || ''
    }).catch(()=>{ API.setToken(''); adminAuth.token=''; localStorage.removeItem('starluck_token') })
  }
}catch(e){}

const adminLogin = async (phone, password)=>{
  if(!API) throw new Error('后端未连接')
  const data = await API.admin.login(phone, password)
  adminAuth.token = data.token
  adminAuth.phone = data.phone
  adminAuth.role = data.role || 'ADMIN'
  adminAuth.loggedIn = true
}
const adminLogout = ()=>{
  API.setToken('')
  adminAuth.token = ''
  adminAuth.loggedIn = false
  adminAuth.phone = ''
  adminAuth.role = ''
  localStorage.removeItem('starluck_token')
  view.value = 'dashboard'
}

/* ===================== 共享 Store（与 app.html 同源 localStorage） ===================== */
const DEFAULT_STORE = {
  loggedIn:false, onboarded:false,
  fakeUsers:[],
  pushRules:{enabled:true, timeSlots:[
    {start:'09:00',end:'11:00',maxPer:1},
    {start:'12:00',end:'14:00',maxPer:1},
    {start:'19:00',end:'22:30',maxPer:2},
  ], strategy:'active', cooldownMin:30},
  pushLog:[],
  csConfig:{systemPrompt:'你是一个温柔可爱的女生，正在和一个有趣的男生聊天。请用女性视角回复，语气自然。', aiKey:'', templates:['你好呀～','在干嘛呢','哈哈是的','我也这么觉得'], autoReplyEnabled:false},
  adminAnalytics:{pushed:0, opened:0, replied:0, paidAfter:0},
  csList:[]  // 客服列表
}

const store = reactive(JSON.parse(JSON.stringify(DEFAULT_STORE)))
try{
  const saved = JSON.parse(localStorage.getItem('yqyr_store')||'null')
  if(saved){
    // 兼容旧版数据：缺字段补默认
    for(const k of Object.keys(DEFAULT_STORE)){
      if(saved[k] === undefined) saved[k] = DEFAULT_STORE[k]
    }
    Object.assign(store, saved)
  }
}catch(e){ console.warn('load store err', e) }

let _saveT
watch(store, ()=>{
  clearTimeout(_saveT)
  _saveT = setTimeout(()=>{
    try{ localStorage.setItem('yqyr_store', JSON.stringify(store)) }catch(e){}
  }, 150)
}, {deep:true})

window.addEventListener('storage', e=>{
  if(e.key !== 'yqyr_store' || !e.newValue) return
  try{
    const incoming = JSON.parse(e.newValue)
    for(const k of Object.keys(incoming)){
      if(typeof incoming[k]==='object' && incoming[k]!==null && !Array.isArray(incoming[k])){
        Object.assign(store[k], incoming[k])
      }else{
        store[k] = incoming[k]
      }
    }
  }catch(_){}
})

/* ===================== Toast ===================== */
const toastState = ref('')
let toastTimer
const toast = (msg)=>{
  toastState.value = msg
  clearTimeout(toastTimer)
  toastTimer = setTimeout(()=>{ toastState.value = '' }, 2000)
}

/* ===================== 智谱 GLM-4-Flash 客户端 ===================== */
const glm = {
  async chat(messages, opts={}){
    const key = opts.key || store.csConfig.aiKey
    if(!key) throw new Error('未配置 API Key')
    const res = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({
        model: opts.model||'glm-4-flash',
        messages,
        temperature: opts.temperature ?? 0.85,
        max_tokens: opts.max_tokens || 200,
      })
    })
    if(!res.ok){
      const err = await res.text().catch(()=>'')
      throw new Error('GLM '+res.status+': '+err.slice(0,140))
    }
    const data = await res.json()
    return data?.choices?.[0]?.message?.content?.trim()||''
  }
}

/* ===================== 假用户工具 ===================== */
const FAKE_NAME_POOL = ['小诗','糖糖','梨花','若兮','茉莉','柚柚','安琪','可可','小鹿','月亮','晓雯','子萱','婉清','雨晴','南风','沐妍','栀子','清欢','一一','阿月']
const CITY_POOL = ['上海','北京','深圳','广州','杭州','成都','南京','武汉','重庆','西安']
const SIGN_POOL = ['寻找一个温暖的人','生活不止眼前的苟且','喜欢摄影、咖啡和旅行','期待一场认真的恋爱','喜欢看星星和电影','愿和你共度春秋','一个人也要好好生活','努力做有趣的女生']
const TAG_POOL = ['旅行','咖啡','摄影','美食','音乐','电影','健身','读书','宠物','瑜伽','汉服','烹饪','逛街','插画','烘焙']

const randomFakeUser = ()=>{
  const pickTags = ()=>{
    const arr = []; const copy = [...TAG_POOL]
    while(arr.length < 3 && copy.length > 0){
      const i = Math.floor(Math.random()*copy.length)
      arr.push(copy[i]); copy.splice(i,1)
    }
    return arr
  }
  return {
    id: null, name: FAKE_NAME_POOL[Math.floor(Math.random()*FAKE_NAME_POOL.length)], av: Math.ceil(Math.random()*8),
    age: 20+Math.floor(Math.random()*12), city: CITY_POOL[Math.floor(Math.random()*CITY_POOL.length)],
    dist: (0.5+Math.random()*5).toFixed(1)+'km',
    sign: SIGN_POOL[Math.floor(Math.random()*SIGN_POOL.length)], tags: pickTags(), online:true, vip:false,
    height:160+Math.floor(Math.random()*15), weight:45+Math.floor(Math.random()*10),
    job:'设计师', edu:'本科', home:'', love:'单身',
    persona:'温柔、爱笑、喜欢分享日常', csOwner:'',
    phone: '199'+String(10000000+Math.floor(Math.random()*90000000)),
    gender: 'F', isAuthed: true, diamonds: 666, cash: 0, userType: 'FAKE'
  }
}

const findUser = id => {
  if(id == null) return null
  // 兼容字符串/数字 id（后端返回数字、前端旧mock可能是字符串）
  return store.fakeUsers.find(u => u.id === id || String(u.id) === String(id)) || null
}

/* ===================== 视图状态 ===================== */
const view = ref('dashboard')
const ui = reactive({
  showFakeModal:false, editingFake:null,
  showBatchModal:false, batchCount:5,
  activeConvId:'',
  aiSuggest:'', aiLoading:false,
  reply:'',
})

/* ===================== 计算属性 ===================== */
// 与假用户的对话（运营关心的）
const fakeConvs = computed(()=>{
  return store.chats.filter(c=>store.fakeUsers.find(f=>f.id===c.uid || String(f.id)===String(c.uid)))
})
const totalUnread = computed(()=>fakeConvs.value.reduce((s,c)=>s+(c.unread||0),0))

const activeConv = computed(()=>store.chats.find(c=>c.id===ui.activeConvId))
const activeFake = computed(()=>activeConv.value ? findUser(activeConv.value.uid) : null)

/* ===================== 业务方法 ===================== */
const ops = {
  addFake(data){
    const fake = data.id ? data : {...randomFakeUser(), ...data}
    if(data.id){
      const i = store.fakeUsers.findIndex(f=>f.id===data.id)
      if(i>=0) store.fakeUsers[i] = fake
    }else{
      store.fakeUsers.push(fake)
    }
    // 同步到后端
    if(apiOn()){
      const payload = {
        id: typeof fake.id === 'number' ? fake.id : undefined,
        name: fake.name, avatarNo: fake.av, age: fake.age, city: fake.city,
        dist: fake.dist || '', sign: fake.sign, online: !!fake.online, vip: !!fake.vip,
        height: fake.height || 165, weight: fake.weight || 48, job: fake.job || '',
        edu: fake.edu || '', hometown: fake.home || '', loveStatus: fake.love || '单身',
        persona: fake.persona || '', tags: fake.tags ? JSON.stringify(fake.tags) : null, status: 1,
        phone: fake.phone || '', gender: fake.gender || 'F',
        isAuthed: fake.isAuthed ? 1 : 0, diamonds: fake.diamonds || 666,
        cash: fake.cash || 0, userType: 'FAKE'
      }
      API.admin.saveFakeUser(payload).catch(err=>{
        console.warn('[api] saveFakeUser failed:', err.message)
      })
    }
  },
  delFake(id){
    if(!confirm('确认删除此假用户？相关会话将保留但不再被推送命中')) return
    store.fakeUsers = store.fakeUsers.filter(f=>f.id!==id)
    toast('已删除')
    if(apiOn() && typeof id === 'number'){
      API.admin.deleteFakeUser(id).catch(err=>{
        console.warn('[api] deleteFakeUser failed:', err.message)
      })
    }
  },
  batchGen(n){
    // 优先走后端：可生成持久化记录
    if(apiOn()){
      API.admin.batchGenerate(n).then(list=>{
        // 将后端返回的假用户合并到本地store
        if(Array.isArray(list)){
          list.forEach(f=>{
            store.fakeUsers.push({
              id: f.id, name: f.name, av: f.avatarNo || 1,
              age: f.age, city: f.city, dist: f.dist || '',
              tags: (typeof f.tags === 'string' ? safeParseJson(f.tags) : f.tags) || [],
              sign: f.sign, online: !!f.online, vip: !!f.vip,
              height: f.height, weight: f.weight || 48, job: f.job || '', edu: f.edu || '',
              home: f.hometown || '', love: f.loveStatus || '单身', persona: f.persona || '',
              csOwner: f.csOwner || '', createdAt: Date.now(),
              phone: f.phone || '', gender: f.gender || 'F',
              isAuthed: !!(f.isAuthed || f.authed), diamonds: f.diamonds || 666,
              cash: f.cash || 0, userType: f.userType || 'FAKE'
            })
          })
          toast('后端已生成 '+list.length+' 个假用户')
        }
      }).catch(err=>{
        console.warn('[api] batchGenerate failed, fallback local:', err.message)
        for(let i=0;i<n;i++) store.fakeUsers.push(randomFakeUser())
        toast('本地生成 '+n+' 个假用户（后端失败）')
      })
    }else{
      for(let i=0;i<n;i++) store.fakeUsers.push(randomFakeUser())
      toast('已生成 '+n+' 个假用户')
    }
  },
  sendReply(text){
    if(!activeConv.value || !text.trim()) return
    activeConv.value.msgs.push({type:'in', text:text.trim(), time:'刚刚', cs:true})
    activeConv.value.lastMsg = text.trim()
    activeConv.value.time = '刚刚'
    activeConv.value.unread = (activeConv.value.unread||0) + 1
    store.adminAnalytics.replied = (store.adminAnalytics.replied||0) + 1
    // 客服回复同步到后端（站在女用户视角发送消息）
    if(apiOn() && activeConv.value.sessionId){
      API.chat.sendMessage(activeConv.value.sessionId, text.trim()).catch(err=>{
        console.warn('[api] cs sendMessage failed:', err.message)
      })
    }
    ui.reply = ''
    ui.aiSuggest = ''
    toast('已发送')
  },
  async askAI(){
    if(!activeConv.value) return
    if(!store.csConfig.aiKey){ toast('请先在 AI 设置 中配置 API Key'); return }
    ui.aiLoading = true
    ui.aiSuggest = ''
    try{
      const last6 = activeConv.value.msgs.slice(-6).filter(m=>m.type==='in'||m.type==='out')
      const dialog = last6.map(m=>({
        // 站在假女用户的视角：男用户(out)是 user 角色，假女(in/cs)是 assistant 角色
        role: m.type==='out' ? 'user' : 'assistant',
        content: m.text
      }))
      const fk = activeFake.value
      const sys = store.csConfig.systemPrompt + `\n你的角色资料：昵称${fk.name}，${fk.age}岁，${fk.city}，性格：${fk.persona||'温柔'}。`
      const out = await glm.chat([
        {role:'system', content:sys},
        ...dialog,
        ...(dialog.length===0 ? [{role:'user', content:'(对方刚刚向你打招呼，请友好回复)'}] : [])
      ])
      ui.aiSuggest = out
    }catch(e){ toast('AI出错: '+e.message) }
    ui.aiLoading = false
  },
  manualPush(fakeId){
    if(!store.loggedIn){ toast('男用户端未登录，无法推送'); return }
    const fu = store.fakeUsers.find(f=>f.id===fakeId)
    if(!fu){ toast('假用户不存在'); return }
    const greetings = ['你好呀～看你头像感觉好亲切','嗨～在干嘛呢','在吗？刚刷到你～','哈喽～感觉我们好像挺投缘的','突然好想找人聊聊天']
    const greet = greetings[Math.floor(Math.random()*greetings.length)]
    let chat = store.chats.find(c=>c.uid===fu.id)
    if(!chat){
      chat = {id:'c'+Date.now(), uid:fu.id, lastMsg:'', time:'刚刚', unread:0, msgs:[
        {type:'sys', text:'TA向你发起了打招呼'}
      ]}
      store.chats.unshift(chat)
    }
    chat.msgs.push({type:'in', text:greet, time:'刚刚'})
    chat.lastMsg = greet
    chat.time = '刚刚'
    chat.unread = (chat.unread||0) + 1
    store.pushLog.push({ts:Date.now(), fakeUid:fu.id, toUid:store.user.id, slot:'manual', opened:false, replied:false})
    store.adminAnalytics.pushed = (store.adminAnalytics.pushed||0) + 1
    toast('已手动推送：'+fu.name+' → 男用户')

    // 同步到后端（需要 fakeId 和 targetUserId 都是后端数字ID）
    if(apiOn() && typeof fu.id === 'number' && typeof store.user.id === 'number'){
      API.admin.manualPush(fu.id, store.user.id).catch(err=>{
        console.warn('[api] manualPush failed:', err.message)
      })
    }
  },
  // 从后端拉取假用户列表覆盖本地
  syncFakesFromBackend(){
    if(!apiOn()) return Promise.resolve()
    return API.admin.getFakeUsers().then(list=>{
      if(!Array.isArray(list)) return
      store.fakeUsers = list.map(f=>({
        id: f.id, name: f.name, av: f.avatarNo || 1,
        age: f.age, city: f.city, dist: f.dist || '',
        tags: (typeof f.tags === 'string' ? safeParseJson(f.tags) : f.tags) || [],
        sign: f.sign, online: !!f.online, vip: !!f.vip,
        height: f.height, weight: f.weight || 48, job: f.job || '', edu: f.edu || '',
        home: f.hometown || '', love: f.loveStatus || '单身', persona: f.persona || '',
        csOwner: f.csOwner || '', createdAt: f.createdAt ? new Date(f.createdAt).getTime() : Date.now(),
        phone: f.phone || '', gender: f.gender || 'F',
        isAuthed: !!(f.isAuthed || f.authed), diamonds: f.diamonds || 666,
        cash: f.cash || 0, userType: f.userType || 'FAKE'
      }))
      toast('已从后端同步 '+list.length+' 个假用户')
    }).catch(err=>{
      console.warn('[api] syncFakes failed:', err.message)
    })
  },
  resetAll(){
    if(!confirm('确认重置所有数据？localStorage 会被清空')) return
    localStorage.removeItem('yqyr_store')
    if(apiOn()) API.auth.logout()
    location.reload()
  },
  // 分配假用户给客服
  assignCs(fakeId, csUserId){
    if(apiOn()){
      API.request('PUT', '/api/admin/fake-users/'+fakeId+'/assign?csUserId='+csUserId)
        .then(()=>{
          const fi = store.fakeUsers.findIndex(f=>f.id===fakeId)
          if(fi>=0) store.fakeUsers[fi].csOwner = csUserId
          toast('已分配')
        }).catch(err=>toast('分配失败：'+err.message))
    } else {
      const fi = store.fakeUsers.findIndex(f=>f.id===fakeId)
      if(fi>=0) store.fakeUsers[fi].csOwner = csUserId
      toast('本地已更新')
    }
  },
  // 加载客服列表
  loadCsList(){
    if(!apiOn()) return
    API.request('GET', '/api/admin/fake-users/cs-list').then(list=>{
      store.csList = (list||[]).map(u=>({
        id: u.id, phone: u.phone, nickname: u.nickname || u.phone
      }))
    }).catch(()=>{})
  }
}

// JSON 解析工具
function safeParseJson(str){
  try { return JSON.parse(str) } catch(e){ return null }
}

// 启动时尝试从后端同步假用户列表
if(apiOn()){
  setTimeout(()=>{
    ops.syncFakesFromBackend()
    ops.loadCsList()
  }, 500)
}

/* 客服工作台 */
const ViewWorkbench = {
  setup(){
    const males = ref([])
    const loading = ref(true)
    const search = ref('')
    const tab = ref('all')       // all | unread | nosession
    const activeSession = ref(null)
    const activeMale = ref(null)
    const msgs = ref([])
    const reply = ref('')
    const aiLoading = ref(false)
    const aiSuggest = ref('')
    const msgFlowRef = ref(null)
    const showFakePicker = ref(false)
    const pickerMaleId = ref(null)
    const pickerFakeId = ref(null)
    let _chatPoll = null
    let _workPoll = null

    const loadMales = async (silent)=>{
      if(!API) return
      if(!silent) loading.value = true
      try{ males.value = await API.admin.getSessions() || [] }catch(e){ if(!silent) toast('加载失败: '+e.message) }
      loading.value = false
    }
    onMounted(()=>{
      loadMales()
      _workPoll = setInterval(()=>{ if(!activeSession.value) loadMales(true) }, 2000)
    })

    const filteredMales = computed(()=>{
      let list = males.value
      const q = search.value.trim().toLowerCase()
      if(q){
        list = list.filter(m=>
          (m.nickname||'').toLowerCase().includes(q) ||
          (m.phone||'').includes(q) ||
          (m.city||'').toLowerCase().includes(q)
        )
      }
      if(tab.value==='unread')  list = list.filter(m=>(m.activeSessions||[]).some(s=>s.femaleUnread>0))
      if(tab.value==='nosession') list = list.filter(m=>!(m.activeSessions||[]).length)
      return list
    })

    const totalUnread = computed(()=>{
      return males.value.reduce((s,m)=>s+(m.activeSessions||[]).reduce((a,x)=>a+(x.femaleUnread||0),0),0)
    })

    const openChat = async (male, session)=>{
      activeMale.value = male
      activeSession.value = session
      msgs.value = []
      try{
        const raw = await API.admin.getChatMessages(session.sessionId)
        msgs.value = (raw||[]).map(m=>({
          type: m.senderRole==='male'?'out': m.senderRole==='system'?'sys':'in',
          text: m.content, time: m.msgTime, cost: m.costDiamond||0, isRead: m.isRead === 1
        }))
        await nextTick()
        if(msgFlowRef.value) msgFlowRef.value.scrollTop = msgFlowRef.value.scrollHeight

        API.admin.markRead(session.sessionId).catch(()=>{})
        const m = males.value.find(x=>x.userId===male.userId)
        if(m){
          const as = (m.activeSessions||[]).find(x=>x.sessionId===session.sessionId)
          if(as) as.femaleUnread = 0
        }
      }catch(e){ toast('加载消息失败: '+e.message) }
      if(_chatPoll) clearInterval(_chatPoll)
      _chatPoll = setInterval(async ()=>{
        if(!activeSession.value) return
        try{
          const raw = await API.admin.getChatMessages(activeSession.value.sessionId)
          const newMsgs = (raw||[]).map(m=>({
            type: m.senderRole==='male'?'out': m.senderRole==='system'?'sys':'in',
            text: m.content, time: m.msgTime, cost: m.costDiamond||0, isRead: m.isRead === 1
          }))
          const hasNew = newMsgs.length !== msgs.value.length
          msgs.value = newMsgs; await nextTick(); if(msgFlowRef.value && hasNew) msgFlowRef.value.scrollTop = msgFlowRef.value.scrollHeight
          if(hasNew) API.admin.markRead(activeSession.value.sessionId).catch(()=>{})
        }catch(e){}
      }, 3000)
    }
    const closeChat = ()=>{ activeSession.value = null; activeMale.value = null; msgs.value = []; if(_chatPoll){ clearInterval(_chatPoll); _chatPoll=null } }

    const send = async ()=>{
      if(!reply.value.trim() || !activeSession.value) return
      const text = reply.value.trim()
      msgs.value.push({type:'in', text, time:'刚刚', cost:0})
      reply.value = ''
      aiSuggest.value = ''
      try{
        await API.admin.chatSend(activeSession.value.sessionId, text)
        const s = activeSession.value
        const m = males.value.find(x=>x.userId===activeMale.value.userId)
        if(m){
          const as = (m.activeSessions||[]).find(x=>x.sessionId===s.sessionId)
          if(as){ as.lastMsg = text; as.lastTime = '刚刚'; as.femaleUnread = 0 }
        }
      }catch(e){ toast('发送失败: '+e.message) }
      await nextTick()
      if(msgFlowRef.value) msgFlowRef.value.scrollTop = msgFlowRef.value.scrollHeight
    }

    const askAI = async ()=>{
      if(!activeSession.value) return
      aiLoading.value = true; aiSuggest.value = ''
      try{ aiSuggest.value = await API.admin.getAiSuggestion(activeSession.value.sessionId) }
      catch(e){ toast('AI错误: '+e.message) }
      aiLoading.value = false
    }
    const useAI = ()=>{ reply.value = aiSuggest.value; aiSuggest.value='' }

    const openFakePicker = (maleId)=>{
      pickerMaleId.value = maleId
      pickerFakeId.value = null
      showFakePicker.value = true
    }
    const startNewChat = async ()=>{
      if(!pickerMaleId.value || !pickerFakeId.value) return
      try{
        await API.admin.manualPush(pickerFakeId.value, pickerMaleId.value)
        showFakePicker.value = false
        toast('会话已创建')
        loadMales()
      }catch(e){ toast('创建失败: '+e.message) }
    }

    return {males, loading, search, tab, filteredMales, totalUnread, activeSession, activeMale, msgs,
            reply, aiLoading, aiSuggest, msgFlowRef, showFakePicker, pickerFakeId,
            openChat, closeChat, send, askAI, useAI, openFakePicker, startNewChat, loadMales, store, view}
  },
  template:`<div>
    <div v-if="!activeSession">
      <div class="toolbar">
        <div class="left">
          <input class="input" v-model="search" placeholder="搜索手机/昵称..." style="width:220px;" />
          <div style="display:flex;gap:4px;">
            <button class="btn tiny" :class="tab==='all'?'':'ghost'" @click="tab='all'">全部</button>
            <button class="btn tiny" :class="tab==='unread'?'':'ghost'" @click="tab='unread'">🔴 未读</button>
            <button class="btn tiny" :class="tab==='nosession'?'':'ghost'" @click="tab='nosession'">无会话</button>

          <span v-if="totalUnread" class="tag red">{{totalUnread}} 条未读</span>
        </div>
        <div class="right">
          <button class="btn small ghost" @click="loadMales">🔄 刷新</button>
        </div>
      </div>
      <div v-if="loading" style="text-align:center;padding:60px;color:#999;">加载中...</div>
      <div v-else-if="!filteredMales.length" class="empty"><div class="ei">📭</div>暂无匹配的男客户</div>
      <div v-else style="display:flex;flex-direction:column;gap:12px;">
        <div v-for="m in filteredMales" :key="m.userId" class="card" :style="{background:(m.activeSessions||[]).some(s=>s.femaleUnread>0)?'#fef0f5':'#fff'}">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <div class="av" :class="'av-'+(m.avatarNo||1)" style="width:40px;height:40px;font-size:16px;">{{(m.nickname||'?')[0]}}</div>
            <div style="flex:1;">
              <div style="font-weight:700;font-size:14px;">{{m.nickname}}</div>
              <div style="font-size:11px;color:#888;">{{m.phone}} <span v-if="m.city" style="margin-left:8px;">📍{{m.city}}</span></div>
            </div>
            <div style="text-align:right;">
              <div><span class="tag gold">✨ {{m.diamonds||0}}</span></div>

            </div>
          </div>
          <div v-if="(m.activeSessions||[]).length" style="display:flex;flex-direction:column;gap:6px;padding:8px 0 8px 52px;border-top:1px solid #f0f0f5;">
            <div v-for="as in m.activeSessions" :key="as.sessionId" style="display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;cursor:pointer;"
                 :style="{background:as.femaleUnread?'#fff0f5':'#fafafd'}" @click="openChat(m, as)">

        男用户端 AI 调用使用同一份 csConfig.aiKey（按需可拆分）。
      </div>
    </div>

/* 推送日志 */
const ViewLogs = {
  setup(){
    const logs = computed(()=>store.pushLog.slice().reverse())
    const fmt = (ts)=>{
      const d = new Date(ts)
      return d.toLocaleDateString()+' '+d.toLocaleTimeString()
    }
    const clearLog = ()=>{
      if(!confirm('清空所有推送日志？')) return
      store.pushLog = []

    }
    return {store, logs, fmt, clearLog, findUser}
  },
  template:`<div>
    <div class="card">
      <div class="card-title">
        <span>推送日志（共 {{logs.length}} 条）</span>
        <button class="btn small ghost" @click="clearLog" style="color:#ff5c8a;">清空日志</button>

/* ===================== 🔐 后台登录页 ===================== */
const ViewLogin = {

    const phone = ref('')
    const password = ref('')
    const loading = ref(false)
    const errMsg = ref('')
    const doLogin = async ()=>{
      errMsg.value = ''
      if(!phone.value.trim()){ errMsg.value='请输入手机号'; return }
      if(!password.value){ errMsg.value='请输入密码'; return }
      loading.value = true
      try{
        await adminLogin(phone.value.trim(), password.value)
      }catch(e){
        errMsg.value = e.message || '登录失败'
      }finally{ loading.value = false }
    }
    return {phone, password, loading, errMsg, doLogin}

/* ===================== 👥 用户管理 ===================== */
const ViewUserMgr = {
  setup(){
    const users = ref([])
    const loading = ref(false)
    const showForm = ref(false)
    const editUser = ref(null)
    const formPhone = ref('')
    const formPwd = ref('')
    const formRole = ref('CS')
    const formStatus = ref('1')

    const loadUsers = async ()=>{
      if(!API) return
      loading.value = true
      try{
        const list = await API.admin.getUsers()
        users.value = list || []
      }catch(e){ toast('加载失败: '+e.message) }
      loading.value = false
    }
    onMounted(loadUsers)

    const openCreate = ()=>{
      editUser.value = null; formPhone.value=''; formPwd.value=''; formRole.value='CS'; formStatus.value='1'
      showForm.value = true
    }
    const openEdit = (u)=>{
      editUser.value = u; formPhone.value=u.phone; formRole.value=u.role; formStatus.value=String(u.status)
      formPwd.value = ''
      showForm.value = true
    }
    const saveUser = async ()=>{
      if(!formPhone.value.trim()){ toast('手机号不能为空'); return }
      try{
        if(editUser.value){
          await API.admin.updateUser(editUser.value.id, {role:formRole.value, status:parseInt(formStatus.value)})
          if(formPwd.value) await API.admin.resetPassword(editUser.value.id, formPwd.value)
          toast('已更新')
        }else{
          if(!formPwd.value){ toast('密码不能为空'); return }
          await API.admin.createUser(formPhone.value.trim(), formPwd.value, formRole.value)
          toast('已创建')
        }
        showForm.value = false; loadUsers()
      }catch(e){ toast(e.message) }
    }
    const delUser = async (u)=>{
      if(!confirm('确定删除 '+u.phone+'？')) return
      try{ await API.admin.deleteUser(u.id); toast('已删除'); loadUsers() }catch(e){ toast(e.message) }
    }
    return {users, loading, showForm, editUser, formPhone, formPwd, formRole, formStatus,
            openCreate, openEdit, saveUser, delUser}
  },
  template:`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="font-size:13px;color:rgba(255,255,255,0.5);">共 {{users.length}} 个账号</span>
      <button class="btn" @click="openCreate" style="background:linear-gradient(135deg,#a18cff,#ff8ad4);color:#fff;border:none;padding:8px 16px;border-radius:18px;cursor:pointer;font-size:12px;">+ 新建账号</button>
    </div>
    <div v-if="loading" style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);">加载中...</div>
    <div v-else class="card" style="overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="background:rgba(180,140,255,0.06);color:rgba(255,255,255,0.5);">
          <th style="padding:10px 14px;text-align:left;">ID</th><th style="padding:10px 14px;text-align:left;">手机号</th>
          <th style="padding:10px 14px;text-align:left;">角色</th><th style="padding:10px 14px;text-align:left;">状态</th>
          <th style="padding:10px 14px;text-align:left;">假用户数</th><th style="padding:10px 14px;text-align:left;">最后登录</th>
          <th style="padding:10px 14px;text-align:left;">操作</th>
        </tr></thead>
        <tbody><tr v-for="u in users" :key="u.id" style="border-bottom:1px solid rgba(180,140,255,0.08);">
          <td style="padding:10px 14px;color:rgba(255,255,255,0.4);">{{u.id}}</td>
          <td style="padding:10px 14px;">{{u.phone}}</td>
          <td style="padding:10px 14px;">
            <span :style="{padding:'2px 8px',borderRadius:'10px',fontSize:'11px',background:u.role==='ADMIN'?'rgba(161,140,255,0.2)':'rgba(122,181,255,0.2)',color:u.role==='ADMIN'?'#a18cff':'#7ab5ff'}">{{u.role}}</span>
          </td>
          <td style="padding:10px 14px;">
            <span style="color:u.status===1?'#5eead4':'#ff5c8a';">{{u.status===1?'启用':'禁用'}}</span>
          </td>
          <td style="padding:10px 14px;">{{u.fakeUserCount||0}}</td>
          <td style="padding:10px 14px;color:rgba(255,255,255,0.4);font-size:12px;">{{u.lastLoginTime||'-'}}</td>
          <td style="padding:10px 14px;">
            <button class="btn small ghost" @click="openEdit(u)">编辑</button>
            <button class="btn small ghost" @click="delUser(u)" style="color:#ff5c8a;">删除</button>
          </td>
        </tr></tbody>
      </table>
    </div>

    <div v-if="showForm" class="modal-overlay" @click.self="showForm=false">
      <div class="modal" style="width:400px;">
        <div class="card-title">{{editUser?'编辑账号':'新建账号'}}</div>
        <div class="form-row"><label>手机号</label><input class="input" v-model="formPhone" :disabled="!!editUser" /></div>
        <div class="form-row"><label>密码{{editUser?'（留空不修改）':''}}</label><input class="input" v-model="formPwd" type="password" /></div>
        <div class="form-row"><label>角色</label>
          <select v-model="formRole" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(180,140,255,0.25);background:#1f0d3a;color:#fff;">
            <option value="ADMIN">管理员 ADMIN</option>
            <option value="CS">客服 CS</option>
          </select>
        </div>
        <div v-if="editUser" class="form-row"><label>状态</label>
          <select v-model="formStatus" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(180,140,255,0.25);background:#1f0d3a;color:#fff;">
            <option value="1">启用</option>
            <option value="0">禁用</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
          <button class="btn ghost" @click="showForm=false">取消</button>
          <button class="btn" @click="saveUser" style="background:linear-gradient(135deg,#a18cff,#ff8ad4);color:#fff;border:none;padding:8px 20px;border-radius:18px;">保存</button>
        </div>
      </div>
    </div>
  </div>`
}

/* 根 App */
const App = {
  components:{ViewDashboard,ViewFakes,ViewWorkbench,ViewPush,ViewAI,ViewLogs,ViewLogin,ViewUserMgr},
  setup(){
    const currentRole = computed(()=>adminAuth.role)
    const isLoggedIn = computed(()=>adminAuth.loggedIn)
    const adminUnread = ref(0)
    let _adminPoll = null

    const pollUnread = async ()=>{
      if(!API || !adminAuth.loggedIn) return
      try{
        const maleUsers = await API.admin.getSessions()
        const total = (maleUsers||[]).reduce((s,m)=>(s+(m.activeSessions||[]).reduce((a,x)=>(a+(x.femaleUnread||0)),0)),0)
        if(total > adminUnread.value && adminUnread.value >= 0){
          toast('收到新消息 (' + total + ' 条未读)')
        }
        adminUnread.value = total
      }catch(e){}
    }
    watch(isLoggedIn, (v)=>{
      if(v){
        pollUnread()
        _adminPoll = setInterval(pollUnread, 2000)
      }else{
        if(_adminPoll){ clearInterval(_adminPoll); _adminPoll=null }
      }
    }, {immediate:true})
    const baseNavs = [
      {k:'dashboard',ic:'📊',n:'数据看板'},
      {k:'fakes',ic:'👤',n:'假用户管理'},
      {k:'workbench',ic:'💬',n:'客服工作台'},
      {k:'push',ic:'📡',n:'推送规则'},
      {k:'ai',ic:'🤖',n:'AI 设置'},
      {k:'logs',ic:'📋',n:'推送日志'},
    ]
    const NAVS = computed(()=>{
      const list = [...baseNavs]
      if(currentRole.value === 'ADMIN') list.push({k:'users',ic:'⚙️',n:'用户管理'})
      return list
    })
    const titles = {dashboard:'数据看板',fakes:'假用户管理',workbench:'客服工作台',push:'推送规则',ai:'AI 设置',logs:'推送日志',users:'用户管理'}
    const currentView = computed(()=>{
      const map = {dashboard:'view-dashboard',fakes:'view-fakes',workbench:'view-workbench',push:'view-push',ai:'view-ai',logs:'view-logs',users:'view-user-mgr'}
      return map[view.value]||'view-dashboard'
    })
    const appOnline = computed(()=>store.loggedIn)
    return {view, NAVS, titles, currentView, store, toastState, totalUnread, appOnline, isLoggedIn, currentRole, adminAuth, adminLogout, adminUnread}
  },
  template:`<div v-if="!isLoggedIn" style="position:fixed;inset:0;z-index:9999;"><view-login /></div>
  <div v-else class="layout">
    <div class="sidebar">
      <div class="logo"><span class="ic">💕</span>Starluck 后台</div>
      <div class="nav">
        <div v-for="n in NAVS" :key="n.k" class="nav-item" :class="{active:view===n.k}" @click="view=n.k">
          <span class="ic">{{n.ic}}</span>
          <span>{{n.n}}</span>
          <span v-if="n.k==='workbench'&&adminUnread" class="bd">{{adminUnread}}</span>
        </div>
      </div>
      <div class="footer">
        <div style="margin-bottom:8px;">{{adminAuth.phone}} · {{currentRole}}</div>
        <button class="btn small ghost" @click="adminLogout" style="color:#ff5c8a;">退出登录</button>
      </div>
    </div>
    <div class="main">
      <div class="header">
        <div class="title">{{titles[view]||''}}</div>
        <div class="right">
          <span class="dot" :class="{off:!appOnline}">{{appOnline?'男用户端已登录':'男用户端未登录'}}</span>
          <span>星光 ✨ {{store.diamonds}}</span>
          <span>余额 ¥{{store.cash.toFixed(2)}}</span>
          <a href="app.html" target="_blank" class="btn small ghost" style="text-decoration:none;">↗ 打开 app.html</a>
        </div>
      </div>
      <div class="content">
        <component :is="currentView" />
      </div>
    </div>
    <div v-if="toastState" class="toast">{{toastState}}</div>
  </div>`
}

createApp(App).mount('#app')
