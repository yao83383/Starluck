/* ══════ Loading Screen ══════ */
#loading-overlay {
  position:fixed; inset:0; z-index:9999;
  background: radial-gradient(ellipse at 50% 50%, #0a1628 0%, #040a14 60%, #020408 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity .8s cubic-bezier(.4,0,.2,1), visibility .8s;
  overflow:hidden;
}
#loading-overlay.fade-out { opacity:0; visibility:hidden; pointer-events:none; }

/* Hex grid background */
.lo-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(60,200,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(60,200,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridPulse 4s ease-in-out infinite;
}
@keyframes gridPulse {
  0%,100% { opacity:.4; }
  50% { opacity:.8; }
}

/* Scan line */
.lo-scanline {
  position:absolute; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent 0%, rgba(60,200,255,.0) 20%, rgba(60,200,255,.25) 50%, rgba(60,200,255,.0) 80%, transparent 100%);
  animation: scanMove 3s linear infinite;
}
@keyframes scanMove { 0% { top:-2px; } 100% { top:100%; } }

/* Floating particles */
.lo-particles { position:absolute; inset:0; overflow:hidden; }
.lo-particle {
  position:absolute; border-radius:50%;
  background: radial-gradient(circle, rgba(60,180,255,.6) 0%, transparent 70%);
  animation: particleFloat 6s ease-in-out infinite;
}
@keyframes particleFloat {
  0%,100% { transform: translateY(0) scale(1); opacity:.3; }
  50% { transform: translateY(-30px) scale(1.3); opacity:.7; }
}

/* Center content container */
.lo-center {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:0;
}

/* Corner brackets */

  position:absolute; width:28px; height:28px;
  border-color: rgba(60,200,255,.25);
  border-style:solid; border-width:0;
}
.lo-bracket.tl { top:-40px; left:-60px; border-top-width:2px; border-left-width:2px; }
.lo-bracket.tr { top:-40px; right:-60px; border-top-width:2px; border-right-width:2px; }
.lo-bracket.bl { bottom:-40px; left:-60px; border-bottom-width:2px; border-left-width:2px; }
.lo-bracket.br { bottom:-40px; right:-60px; border-bottom-width:2px; border-right-width:2px; }

}

/* Progress bar container */
.lo-bar-wrap {

/* Progress bar fill */

  height:100%; width:0; border-radius:2px;

  position:relative;
}
.lo-bar::after {
  content:''; position:absolute; right:0; top:-3px; width:2px; height:9px;
  background:#3cc8ff; border-radius:1px;
  box-shadow: 0 0 6px #3cc8ff, 0 0 14px rgba(60,200,255,.5);

@keyframes barShimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
@keyframes barProgress {
  0%   { width:0%; }
  15%  { width:12%; }
  35%  { width:38%; }
  55%  { width:58%; }
  75%  { width:78%; }
  90%  { width:92%; }
  100% { width:100%; }

/* Status text */
.lo-status {

.lo-status .blink {

/* Bottom decoration */
.lo-bottom-line {
  position:absolute; bottom:32px; left:50%; transform:translateX(-50%);

}
.lo-bottom-line .dot { width:3px; height:3px; border-radius:50%; background:rgba(60,200,255,.2); }
.lo-bottom-line .line { width:40px; height:1px; background:rgba(60,200,255,.08); }
.lo-bottom-line .ver { font-size:9px; color:rgba(60,200,255,.18); letter-spacing:3px; }

/* Error state */
#loading-overlay.error .lo-bar { background: linear-gradient(90deg, #991a1a, #ff4d4f, #991a1a); }
#loading-overlay.error .lo-status { color:rgba(255,80,80,.6); }
#loading-overlay.error .lo-title { text-shadow: 0 0 20px rgba(255,80,80,.4); }

<div id="status" style="display:none"></div>
<script>
// Loading screen: scene-ready gate + bar animation
window._loSceneReady = false;
window._loBarDone = false;
function dismissOverlay() {
  if (window._loSceneReady && window._loBarDone) {
    var ov = document.getElementById('loading-overlay');
    if (ov) ov.classList.add('fade-out');
  }
}
(function() {
  // particles
  var pc = document.getElementById('lo-particles');
  if (pc) {
    for (var i = 0; i < 18; i++) {
      var p = document.createElement('div');
      p.className = 'lo-particle';
      var s = 2 + Math.random() * 4;
      p.style.cssText = 'width:'+s+'px;height:'+s+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;animation-delay:'+(Math.random()*6)+'s;animation-duration:'+(4+Math.random()*4)+'s;';
      pc.appendChild(p);
    }
  }
  // status text cycling
  var msgs = ['LOADING MODULES', 'INITIALIZING SCENE', 'BUILDING GRAPH', 'READY'];
  var si = 0, stEl = document.getElementById('lo-status');
  if (stEl) {
    var iv = setInterval(function() {
      si++;
      if (si >= msgs.length) { clearInterval(iv); return; }
      stEl.innerHTML = msgs[si] + '<span class="blink">_</span>';
    }, 250);
  }
  // bar done after 1s animation
  setTimeout(function() { window._loBarDone = true; dismissOverlay(); }, 3200);
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NODE_R = 10;
const sharedSphereGeo = new THREE.SphereGeometry(NODE_R, 48, 36);
const EDGE_DEFAULT_OPACITY = 0.30;
const EDGE_ACTIVE_OPACITY  = 1.00;
const FOV = 52;
const FOV_TAN = Math.tan((FOV * Math.PI / 180) / 2);

const G = {
  '空间域':{hex:'#4ECDC4',c3:0x4ECDC4},'组织域':{hex:'#4A90D9',c3:0x4A90D9},
  '人员域':{hex:'#6496ED',c3:0x6496ED},'排班域':{hex:'#F0A040',c3:0xF0A040},
  '管理域':{hex:'#52C574',c3:0x52C574},
};
const GROUP_KEYS = Object.keys(G);

const NODES_DEF = [
  { id:'WorkGrid',label:'工作网格',group:'空间域',desc:'环卫作业网格单元，子类of SpatialThing，承载边界坐标点和作业面积。' },
  { id:'GridPoint',label:'网格坐标点',group:'空间域',desc:'工作网格的边界坐标点，子类of Point，含经纬度和序号。' },
  { id:'Project',label:'项目',group:'组织域',desc:'环卫服务项目，含项目编码和全称。' },
  { id:'Person',label:'人员',group:'人员域',desc:'环卫工作人员，含姓名和手机号。' },
  { id:'Position',label:'岗位',group:'人员域',desc:'工作岗位定义，含岗位编码和名称。' },
  { id:'Section',label:'片区',group:'管理域',desc:'环卫作业责任片区，含片区ID、名称、类型和面积。' },
  { id:'SectionRailRel',label:'片区网格关联',group:'管理域',desc:'片区与网格的关联关系，通过sectionIdRef和railIdRef连接。' },
  { id:'BaseOrganize',label:'组织机构',group:'组织域',desc:'组织机构信息，含层级、分类、上级关系和关联项目。' },
  { id:'ArrangeSchedual',label:'排班记录',group:'排班域',desc:'排班记录，关联人员、班次和项目组织。' },
  { id:'MemberBase',label:'人员基础信息',group:'人员域',desc:'qyzhhw_member.member_base，人员基础信息和岗位。' },
  { id:'SchedualConfig',label:'班次配置',group:'排班域',desc:'班次配置，含班次主键和名称。' },
  { id:'SchedualTimeConfig',label:'班次时段配置',group:'排班域',desc:'班次时段配置，含上下班时刻，关联班次。' },
  { id:'MemberEmployment',label:'人员任职',group:'人员域',desc:'人员任职记录，关联人员和岗位名称。' },
];

const PLANET_R = 200;
const GOLDEN_ANG = Math.PI * (3 - Math.sqrt(5));
const NODES = NODES_DEF.map((n, i) => {
  const total = NODES_DEF.length;
  const y = 1 - (i / (total - 1)) * 2;
  const r = Math.sqrt(Math.max(0, 1 - y * y));
  const theta = GOLDEN_ANG * i;
  return { ...n, pos: [
    Math.cos(theta) * r * PLANET_R,
    y * PLANET_R,
    Math.sin(theta) * r * PLANET_R
  ]};
});
const NID = NODES.reduce((m, n) => { m[n.id] = n; return m; }, {});

// ═══════════════════════════════════════════════
//  EDGES — OWL 本体属性推导的关联关系
// ═══════════════════════════════════════════════
const EDGES_DEF = [
  // OWL 对象属性
  { s:'WorkGrid',t:'GridPoint',act:'包含坐标点' },
  // 数据属性域推导的关联（语义化）
  { s:'WorkGrid',t:'BaseOrganize',act:'归属组织' },
  { s:'WorkGrid',t:'Section',act:'归属片区' },
  { s:'SectionRailRel',t:'Section',act:'关联片区' },
  { s:'SectionRailRel',t:'WorkGrid',act:'关联网格' },
  { s:'BaseOrganize',t:'Project',act:'承载项目' },
  // BaseOrganize 自身层级 (organizeParentId) 为自环，不生成边
  // Person ↔ MemberBase 为同一实体双向映射，保留 MemberBase→Person
  { s:'MemberBase',t:'MemberEmployment',act:'任职记录' },
  { s:'MemberEmployment',t:'Position',act:'担任岗位',bi:true },
  { s:'MemberBase',t:'ArrangeSchedual',act:'排班' },
  { s:'ArrangeSchedual',t:'SchedualConfig',act:'使用班次' },
  { s:'ArrangeSchedual',t:'BaseOrganize',act:'归属组织' },
  { s:'SchedualConfig',t:'SchedualTimeConfig',act:'配置时段',bi:true },
  { s:'MemberBase',t:'Person',act:'对应人员' },
];
const EDGES = EDGES_DEF.map(e => ({ s:e.s, t:e.t, act:e.act, isAction:true, bi:!!e.bi }));
const ACTION_COUNT = EDGES.length;

const NBRS = {};
NODES.forEach(n => { NBRS[n.id] = new Set(); });
EDGES.forEach(({ s, t }) => { NBRS[s].add(t); NBRS[t].add(s); });

// ═══════════════════════════════════════════════
//  TEXTURES
// ═══════════════════════════════════════════════
const TC = {};
function circleTex() {
  if (TC._c) return TC._c;
  const cv = document.createElement('canvas'); cv.width = cv.height = 128;
  const ctx = cv.getContext('2d');

            o.sphereMat.opacity = 0.85;
            o.ringMat.opacity = 0.3;
            o.lblMat.map = o.lblWhiteTex; o.lblMat.needsUpdate = true;
            o.lbl.material.opacity = 1.00;
            hlStates[n.id] = 'related';
          } else {
            o.sphereMat.emissiveIntensity = 0.03;
            o.sphereMat.opacity = 0.35;
            o.ringMat.opacity = 0;
            o.lblMat.map = labelTex(n.label, G[n.group].hex); o.lblMat.needsUpdate = true;
            o.lbl.material.opacity = camDistOpacity * 0.5;
            hlStates[n.id] = 'dimmed';
          }
        });
        eObjs.forEach(e => {
          const on = hlSet.has(e.s) && hlSet.has(e.t);
          e.line.material.opacity = on ? EDGE_ACTIVE_OPACITY : 0.05;
          if (e.particles) e.particles.material.opacity = on ? 0.90 : 0.04;
          if (e.revParticles) e.revParticles.material.opacity = on ? 0.90 : 0.04;
          e.arrT.material.opacity = on ? 0.85 : 0;
          if (e.arrS) e.arrS.material.opacity = on ? 0.85 : 0;
        });
      }
      function hoverClear() {
        NODES.forEach(n => {
          const o = nObjs[n.id]; if (!o) return;
          o.sphereMat.emissiveIntensity = o.baseEmissive;
          o.sphereMat.opacity = 0.75;
          o.ringMat.opacity = 0;
          o.lblMat.map = labelTex(n.label, G[n.group].hex); o.lblMat.needsUpdate = true;
          o.lbl.material.opacity = camDistOpacity;
          hlStates[n.id] = 'default';
        });
        eObjs.forEach(e => {
          e.line.material.opacity = EDGE_DEFAULT_OPACITY;
          if (e.particles) e.particles.material.opacity = 0.70;
          if (e.revParticles) e.revParticles.material.opacity = 0.70;
          e.arrT.material.opacity = 0;
          if (e.arrS) e.arrS.material.opacity = 0;
        });
      }
      let hovId = null, labelsOn = false;
      renderer.domElement.addEventListener('mousemove', e => {
        if (e.buttons !== 0) return;
        const newId = nodeAtScreen(e.clientX, e.clientY);
        if (newId === hovId) return;
        const selId = selRef.current;
        const grpLit = litGrpRef.current;
        if (!selId && !grpLit) {
          if (newId) hoverHL(newId);
          else hoverClear();
        } else if (grpLit && !selId) {
          // Group selected: merge hovered node + its neighbors into group highlight
          const gNodes = NODES.filter(n => n.group === grpLit);
          const gSet = new Set(gNodes.map(n => n.id));
          const hovSet = newId ? new Set([newId, ...(NBRS[newId]||[])]) : new Set();
          applyHL(null, new Set([...gSet, ...hovSet]), true);
        } else if (selId && newId && newId !== selId) {
          const selSet = new Set([selId, ...(NBRS[selId]||[])]);
          const hovSet = new Set([newId, ...(NBRS[newId]||[])]);
          const merged = new Set([...selSet, ...hovSet]);
          applyHL(selId, merged, labelsOn);
          // Suppress labels on hover-only edges
          eObjs.forEach(e => {
            const inHov = hovSet.has(e.s) && hovSet.has(e.t);
            const inSel = selSet.has(e.s) && selSet.has(e.t);
            if (inHov && !inSel) e.eLblMat.opacity = 0;
          });
        } else if (selId) {
          applyHL(selId, new Set([selId, ...(NBRS[selId]||[])]), labelsOn);
        }
        // grpLit without selId → do nothing, preserve group highlight
        hovId = newId;
        document.body.style.cursor = newId ? 'pointer' : 'default';
      });
      renderer.domElement.addEventListener('mouseleave', () => {
        const selId = selRef.current;
        const grpLit = litGrpRef.current;
        if (!selId && !grpLit) hoverClear();
        else if (grpLit && !selId) {
          const gNodes = NODES.filter(n => n.group === grpLit);
          applyHL(null, new Set(gNodes.map(n => n.id)), true);
        } else if (selId) applyHL(selId, new Set([selId, ...(NBRS[selId]||[])]), labelsOn);
        hovId = null; document.body.style.cursor = 'default';
      });

      // Screen-space node detection
      const _v3 = new THREE.Vector3();
      function nodeAtScreen(sx, sy, threshold = 13) {
        const vW = window.innerWidth, vH = window.innerHeight;
        let bestD = threshold, bestId = null;
        NODES.forEach(n => {
          _v3.set(...n.pos).project(camera);
          if (_v3.z > 1) return;
          const dx = (_v3.x+1)/2*vW - sx, dy = sy - (1-_v3.y)/2*vH;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < bestD) { bestD = d; bestId = n.id; }
        });
        return bestId;
      }

      // Camera fly
      const HOME_CAM = new THREE.Vector3(0, 60, 880), HOME_TGT = new THREE.Vector3(0, 0, 0);
      let flyAnim = null;
      const _startFly = (camTo, tgtTo, dur = 1100) => {
        const sd = ctrl.dampingFactor; ctrl.dampingFactor = 1.0; ctrl.update(); ctrl.dampingFactor = sd;
        flyAnim = { t0:performance.now(), dur, camFrom:camera.position.clone(), camTo, tgtFrom:ctrl.target.clone(), tgtTo };
      };
      const flyToGroup = ids => {
        if (!ids?.length) return;
        const pts = ids.map(id => nObjs[id]?.disc?.position).filter(Boolean);
        if (!pts.length) return;
        const c = new THREE.Vector3(); pts.forEach(p => c.add(p)); c.divideScalar(pts.length);
        let maxR = 0; pts.forEach(p => { maxR = Math.max(maxR, c.distanceTo(p)); });
        maxR = Math.max(maxR, 80); const dist = Math.max(maxR*2.1, 200);
        _startFly(new THREE.Vector3(c.x+40, c.y+dist*0.44, c.z+dist), c.clone(), 1200);
        ctrl.autoRotate = false;
      };
      const flyToHome = () => _startFly(HOME_CAM.clone(), HOME_TGT.clone(), 1400);

      function isNodeInView(nid) {
        const n = NID[nid]; if (!n) return false;
        const v = new THREE.Vector3(...n.pos).project(camera);
        const sx = (v.x+1)/2*W, sy = (-v.y+1)/2*H;
        return sx >= 0 && sx <= W && sy >= 0 && sy <= H;
      }

      // Input handlers
      let totalDrag = 0;
      window.addEventListener('pointermove', e => { if (e.buttons > 0) totalDrag += Math.abs(e.movementX) + Math.abs(e.movementY); });
      renderer.domElement.addEventListener('click', e => {
        if (totalDrag > 8) return;
        const nid = nodeAtScreen(e.clientX, e.clientY);
        if (nid) {
          selRef.current = nid; setSel(NID[nid]); setLitGrp(NID[nid].group);
          labelsOn = true;
          applyHL(nid, new Set([nid, ...(NBRS[nid]||[])]), true);
          flyToGroup([nid, ...Array.from(NBRS[nid]||[])]);
        } else {
          selRef.current = null; setSel(null); setLitGrp(null); clearHL();
        }
      });
      renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
      renderer.domElement.addEventListener('pointerdown', () => { totalDrag = 0; });

      // Tick
      const clock = new THREE.Clock(); let raf;
      const LABEL_FAR = 950, LABEL_NEAR = 450; let camDistOpacity = 0;
      const tick = () => {
        raf = requestAnimationFrame(tick); const T = clock.getElapsedTime();
        if (flyAnim) {
          const raw = Math.min((performance.now()-flyAnim.t0)/flyAnim.dur, 1);
          const ease = raw < 0.5 ? 4*raw*raw*raw : 1-Math.pow(-2*raw+2,3)/2;
          camera.position.lerpVectors(flyAnim.camFrom, flyAnim.camTo, ease);
          ctrl.target.lerpVectors(flyAnim.tgtFrom, flyAnim.tgtTo, ease);
          if (raw >= 1) flyAnim = null;
        }
        const camDist = camera.position.length();
        camDistOpacity = Math.max(0, Math.min(1, (LABEL_FAR-camDist)/(LABEL_FAR-LABEL_NEAR)));
        let sphOp;
        if (camDist <= 300) sphOp = 0.023;
        else if (camDist >= 1200) sphOp = 0.07;
        else sphOp = 0.023 + (camDist-300)/(1200-300)*(0.07-0.023);
        sphMesh.material.opacity = sphOp;

        NODES.forEach(n => {
          const o = nObjs[n.id]; if (!o) return;
          const dist = camera.position.distanceTo(o.disc.position);
          const wpp = (2*dist*FOV_TAN)/window.innerHeight;
          const nodeScale = Math.min(1.2 * wpp, 1.2);    // keep sphere ~24px on screen
          o.disc.scale.setScalar(nodeScale);
          o.ring.scale.setScalar(nodeScale);
          // Ring stays 2px below sphere bottom in screen space
          o.ring.position.y = n.pos[1] - NODE_R * nodeScale - 10 * wpp;
          const lblH = 32*wpp; o.lbl.scale.set(lblH*8.0, lblH, 1);
          const scaledR = NODE_R * nodeScale;
          o.lbl.position.set(n.pos[0], n.pos[1]+scaledR*1.45+lblH*0.65, n.pos[2]);
          if (hlStates[n.id] === 'default' && n.id !== hovId) o.lbl.material.opacity = camDistOpacity;
          if (hlStates[n.id] === 'dimmed') o.lbl.material.opacity = camDistOpacity * 0.5;
        });

        // Particle flow + line endpoints to sphere surface + arrow scaling
        eObjs.forEach(e => {
          const sp = nObjs[e.s]?.disc?.position, tp = nObjs[e.t]?.disc?.position;
          if (!sp || !tp) return;

          // Compute nodeScale for each end
          const sDist = camera.position.distanceTo(sp), tDist = camera.position.distanceTo(tp);
          const sWpp = (2*sDist*FOV_TAN)/window.innerHeight, tWpp = (2*tDist*FOV_TAN)/window.innerHeight;
          const sNS = Math.min(1.2*sWpp, 1.2), tNS = Math.min(1.2*tWpp, 1.2);
          const sR = NODE_R * sNS, tR = NODE_R * tNS;

          // Update line endpoints to sphere surface
          const posAttr = e.line.geometry.attributes.position;
          posAttr.setXYZ(0, sp.x + e.dir.x * sR, sp.y + e.dir.y * sR, sp.z + e.dir.z * sR);
          posAttr.setXYZ(1, tp.x - e.dir.x * tR, tp.y - e.dir.y * tR, tp.z - e.dir.z * tR);
          posAttr.needsUpdate = true;

          // Arrow at target end: root outside sphere, tip touches surface
          const midD = camera.position.distanceTo(new THREE.Vector3().addVectors(sp, tp).multiplyScalar(0.5));
          const midWpp = (2*midD*FOV_TAN)/window.innerHeight;
          const arrScale = 2.25 * midWpp;
          const arrowLen = 6 * arrScale;  // ConeGeometry height=6
          e.arrT.position.set(tp.x - e.dir.x * (tR + arrowLen), tp.y - e.dir.y * (tR + arrowLen), tp.z - e.dir.z * (tR + arrowLen));
          e.arrT.scale.setScalar(arrScale);
          if (e.arrS) {
            e.arrS.position.set(sp.x + e.dir.x * (sR + arrowLen), sp.y + e.dir.y * (sR + arrowLen), sp.z + e.dir.z * (sR + arrowLen));
            e.arrS.scale.setScalar(arrScale);
          }

          // Edge label
          const mid = new THREE.Vector3().addVectors(sp, tp).multiplyScalar(0.5);
          if (e.eLblMat && e.eLblMat.opacity > 0.01) {
            const lh = 22*midWpp, asp = e.eLblMat.map?._aspect||3;
            e.eLbl.scale.set(lh*asp, lh, 1);
          }

          // Flowing particles
          if (e.particles && e.pAttr) {
            for (let i = 0; i < N_PARTICLES; i++) {
              const ph = ((T * FLOW_SPEED + i / N_PARTICLES) % 1);
              e.pAttr.setXYZ(i,
                sp.x + (tp.x - sp.x) * ph,
                sp.y + (tp.y - sp.y) * ph,
                sp.z + (tp.z - sp.z) * ph
              );
            }
            e.pAttr.needsUpdate = true;
          }
          // Reverse particles for bidirectional edges
          if (e.revParticles && e.revPAttr) {
            for (let i = 0; i < N_PARTICLES; i++) {
              const ph = ((T * FLOW_SPEED + i / N_PARTICLES) % 1);
              e.revPAttr.setXYZ(i,
                tp.x + (sp.x - tp.x) * ph,
                tp.y + (sp.y - tp.y) * ph,
                tp.z + (sp.z - tp.z) * ph
              );
            }
            e.revPAttr.needsUpdate = true;
          }
        });
        if (window._starfield) window._starfield.rotation.y += 0.00012;
        ctrl.update(); renderer.render(scene, camera);
      };
      tick();

      const onResize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
      window.addEventListener('resize', onResize);
      threeRef.current = { ctrl, nObjs, eObjs, applyHL, clearHL, flyToGroup, flyToHome, hlStates };
      window._loSceneReady = true; dismissOverlay();
      return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize); renderer.dispose(); if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement); };
    }; init(); }, []);

  useEffect(() => { const { ctrl } = threeRef.current; if (ctrl) ctrl.autoRotate = rotate; }, [rotate]);

  const handleGroup = group => {
    const { applyHL, clearHL, flyToGroup, flyToHome } = threeRef.current;
    if (!applyHL) return; setSel(null); selRef.current = null;
    if (!group) { clearHL(); setLitGrp(null); flyToHome?.(); return; }
    setLitGrp(group); const gNodes = NODES.filter(n => n.group === group);
    applyHL(null, new Set(gNodes.map(n => n.id)), true); flyToGroup?.(gNodes.map(n => n.id));
  };
  const handleChip = node => {
    const { applyHL, flyToGroup } = threeRef.current;
    if (!applyHL) return; selRef.current = node.id; setSel(node); setLitGrp(node.group);
    applyHL(node.id, new Set([node.id, ...(NBRS[node.id]||[])]), true);
    flyToGroup?.([node.id, ...Array.from(NBRS[node.id]||[])]);
  };
  const handleClose = () => {
    const { clearHL, ctrl, flyToHome } = threeRef.current;
    selRef.current = null; setSel(null); setLitGrp(null); clearHL?.();
    if (ctrl) ctrl.autoRotate = rotate; flyToHome?.();
  };

  return (
    <div style={{position:'fixed',inset:0}}>
      <div ref={mountRef} style={{position:'fixed',inset:0}}/>
      <div id="ui">
        <TopBar/>
        <GroupPanel lit={litGrp} onGroup={handleGroup}/>
        <DetailPanel node={sel} onClose={handleClose} onChipClick={handleChip}/>
        <div className="ctrls">
          <button className={'cbtn'+(rotate?' on':'')} onClick={() => setRotate(r=>!r)}>⟳ 自动旋转</button>
          <button className="cbtn" onClick={handleClose}>↺ 重置</button>
        </div>
        <div className="hint">
          悬浮高亮关联 · 点击节点查看关系 · 左键旋转 · 中键拖拽 · 滚轮缩放<br/>
          左侧可按业务分组过滤
          <div className="action-legend">
            <div className="al-dot"/><span className="al-label">箭头方向=动作方向 · 单向箭头=1对多 · 双向箭头=多对多</span>
          </div>
        </div>
      </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
