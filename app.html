<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover" />
<meta name="format-detection" content="telephone=no, email=no, address=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="x5-orientation" content="portrait" />
<meta name="screen-orientation" content="portrait" />
<meta name="full-screen" content="yes" />
<title>一青友人</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a2e;color:#2d2d3a;line-height:1.4;font-size:14px;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
img{max-width:100%;display:block;}
button{border:none;outline:none;background:none;font-family:inherit;cursor:pointer;}
input,textarea{border:none;outline:none;font-family:inherit;background:none;}
a{text-decoration:none;color:inherit;}

/* 手机壳（桌面端可见） */
.phone-shell{width:375px;height:812px;background:#fff;border-radius:42px;box-shadow:0 30px 80px rgba(0,0,0,.45),0 0 0 14px #111 inset,0 0 0 18px #2a2a2a;position:relative;overflow:hidden;}
.phone-shell::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:130px;height:28px;background:#111;border-radius:0 0 18px 18px;z-index:9999;}

@media(max-width:430px){
  body{background:#fff;}
  .phone-shell{width:100vw;height:100vh;border-radius:0;box-shadow:none;}
  .phone-shell::before{display:none;}
}

/* 屏幕容器 */
.screen{width:100%;height:100%;background:linear-gradient(180deg,#fef6f9 0%,#f3eaff 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;}

/* 状态栏 */
.status-bar{height:38px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 6px;font-size:13px;font-weight:600;color:#2d2d3a;flex-shrink:0;position:relative;z-index:10;}
.status-bar .icons{display:flex;gap:5px;align-items:center;}
.status-bar.dark{color:#fff;}

/* 顶部导航条 */
.nav-bar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#fff;flex-shrink:0;position:relative;z-index:9;}
.nav-bar .back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#2d2d3a;}
.nav-bar .title{font-size:17px;font-weight:700;color:#2d2d3a;flex:1;text-align:center;}
.nav-bar .right{min-width:32px;font-size:14px;color:#666;text-align:right;}
.nav-bar.transparent{background:transparent;}
.nav-bar.dark{background:transparent;}
.nav-bar.dark .back,.nav-bar.dark .title,.nav-bar.dark .right{color:#fff;}

/* 页面顶部大标题区 */
.page-top{padding:6px 18px 14px;background:#fff;flex-shrink:0;}
.page-top h1{font-size:24px;font-weight:800;color:#2d2d3a;margin-bottom:2px;}
.page-top .sub{font-size:12px;color:#999;}

/* 主内容区 */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{display:none;}

/* 底部 Tab Bar */
.tab-bar{height:60px;display:flex;background:#fff;border-top:1px solid #f0f0f5;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);}
.tab-bar .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999;font-size:11px;gap:2px;}
.tab-bar .tab-item .ico{font-size:22px;line-height:1;}
.tab-bar .tab-item.active{color:#ff5a8a;font-weight:600;}

/* 主CTA按钮 */
.btn{display:inline-flex;align-items:center;justify-content:center;height:46px;padding:0 24px;border-radius:23px;font-size:15px;font-weight:600;background:linear-gradient(135deg,#ff5a8a 0%,#b66dff 100%);color:#fff;box-shadow:0 6px 18px rgba(255,90,138,.35);transition:transform .15s ease;}
.btn:active{transform:scale(.96);}
.btn.block{width:100%;}
.btn.gold{background:linear-gradient(135deg,#ffd75e 0%,#ff9a3c 100%);color:#5a3a00;box-shadow:0 6px 18px rgba(255,154,60,.35);}
.btn.ghost{background:#fff;color:#ff5a8a;border:1.5px solid #ff5a8a;box-shadow:none;}
.btn.dark{background:#2d2d3a;box-shadow:0 6px 18px rgba(0,0,0,.2);}
.btn.small{height:32px;padding:0 14px;border-radius:16px;font-size:13px;}
.btn.danger{background:linear-gradient(135deg,#ff3b5c 0%,#ff5a8a 100%);}
.btn:disabled{opacity:.5;box-shadow:none;}

/* 头像渐变 */
.av{width:50px;height:50px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:18px;}
.av-1{background:linear-gradient(135deg,#ff5a8a,#b66dff);}
.av-2{background:linear-gradient(135deg,#7c5aff,#4ade80);}
.av-3{background:linear-gradient(135deg,#ffd75e,#ff9a3c);}
.av-4{background:linear-gradient(135deg,#ff3b5c,#ffd75e);}
.av-5{background:linear-gradient(135deg,#4ade80,#7c5aff);}
.av-6{background:linear-gradient(135deg,#b66dff,#ff5a8a);}
.av-7{background:linear-gradient(135deg,#ff9a3c,#ff3b5c);}
.av-8{background:linear-gradient(135deg,#7c5aff,#ff5a8a);}

/* 通用卡片 */
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 6px 16px rgba(0,0,0,.05);}

/* 标签 */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:#fef0f5;color:#ff5a8a;}
.tag.purple{background:#f3eaff;color:#7c5aff;}
.tag.gold{background:#fff5d6;color:#ff9a3c;}
.tag.green{background:#e8fbef;color:#22c55e;}
.tag.gray{background:#f0f0f5;color:#666;}
.tag.vip{background:linear-gradient(135deg,#ffd75e,#ff9a3c);color:#5a3a00;font-weight:700;}

/* 红点 */
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:#ff3b5c;color:#fff;font-size:10px;font-weight:700;border-radius:9px;}
.badge.dot{min-width:8px;height:8px;padding:0;border-radius:50%;}

/* === ① 登录页 === */
.login-page{padding:32px 28px;display:flex;flex-direction:column;height:100%;background:linear-gradient(180deg,#fef6f9 0%,#f3eaff 100%);}
.login-page .logo{font-size:48px;text-align:center;margin-top:60px;}
.login-page h1{font-size:32px;font-weight:800;text-align:center;margin-top:14px;background:linear-gradient(135deg,#ff5a8a,#b66dff);-webkit-background-clip:text;background-clip:text;color:transparent;}
.login-page .slogan{font-size:14px;color:#999;text-align:center;margin-top:8px;}
.login-page .form{margin-top:48px;}
.login-page .input-row{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.login-page .input-row .prefix{color:#ff5a8a;font-weight:600;}
.login-page .input-row input{flex:1;font-size:15px;color:#2d2d3a;}
.login-page .input-row .send-code{color:#ff5a8a;font-weight:600;font-size:13px;}
.login-page .send-code.disabled{color:#bbb;}
.login-page .agree{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:#999;margin-top:14px;}
.login-page .agree .cb{width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;margin-top:2px;}
.login-page .agree .cb.on{background:#ff5a8a;border-color:#ff5a8a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;}
.login-page .agree a{color:#ff5a8a;}
.login-page .third{margin-top:40px;text-align:center;}
.login-page .third .label{font-size:11px;color:#bbb;position:relative;margin-bottom:20px;}
.login-page .third .label::before,.login-page .third .label::after{content:"";position:absolute;top:50%;width:40px;height:1px;background:#eee;}
.login-page .third .label::before{right:calc(50% + 50px);}
.login-page .third .label::after{left:calc(50% + 50px);}
.login-page .third .ico-row{display:flex;justify-content:center;gap:24px;}
.login-page .third .ico{width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 10px rgba(0,0,0,.05);}

/* === ② 发现/用户列表 === */
.discover-tabs{display:flex;gap:18px;padding:0 18px 12px;background:#fff;overflow-x:auto;}
.discover-tabs::-webkit-scrollbar{display:none;}
.discover-tabs .tab{font-size:15px;color:#999;font-weight:500;white-space:nowrap;padding:6px 2px;position:relative;}
.discover-tabs .tab.active{color:#2d2d3a;font-weight:700;font-size:17px;}
.discover-tabs .tab.active::after{content:"";position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:18px;height:3px;border-radius:2px;background:linear-gradient(90deg,#ff5a8a,#b66dff);}
.filter-bar{display:flex;gap:8px;padding:10px 18px;background:#fff;overflow-x:auto;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-bar .chip{padding:6px 12px;background:#f7f7fa;color:#666;font-size:12px;border-radius:14px;white-space:nowrap;}
.filter-bar .chip.active{background:#fef0f5;color:#ff5a8a;font-weight:600;}
.user-grid{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.user-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.05);position:relative;}
.user-card .cover{width:100%;aspect-ratio:1/1.15;display:flex;align-items:flex-end;padding:8px;position:relative;color:#fff;}
.user-card .cover::before{content:"";position:absolute;inset:0;z-index:0;}
.user-card.av-1 .cover::before{background:linear-gradient(135deg,#ff5a8a,#b66dff);}
.user-card.av-2 .cover::before{background:linear-gradient(135deg,#7c5aff,#4ade80);}
.user-card.av-3 .cover::before{background:linear-gradient(135deg,#ffd75e,#ff9a3c);}
.user-card.av-4 .cover::before{background:linear-gradient(135deg,#ff3b5c,#ffd75e);}
.user-card.av-5 .cover::before{background:linear-gradient(135deg,#4ade80,#7c5aff);}
.user-card.av-6 .cover::before{background:linear-gradient(135deg,#b66dff,#ff5a8a);}
.user-card .cover-inner{position:relative;z-index:1;width:100%;}
.user-card .top-flags{position:absolute;top:8px;left:8px;display:flex;gap:4px;z-index:2;}
.user-card .flag{padding:2px 6px;font-size:10px;background:rgba(0,0,0,.4);color:#fff;border-radius:8px;backdrop-filter:blur(4px);}
.user-card .flag.online{background:#4ade80;}
.user-card .flag.vip{background:linear-gradient(135deg,#ffd75e,#ff9a3c);color:#5a3a00;font-weight:700;}
.user-card .info{padding:8px 10px;}
.user-card .info .name{font-size:14px;font-weight:700;color:#2d2d3a;display:flex;align-items:center;gap:4px;}
.user-card .info .meta{font-size:11px;color:#999;margin-top:2px;}
.user-card .info .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}

/* === ③ 消息列表 === */
.msg-quick{padding:14px 18px;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.msg-quick .qi{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
.msg-quick .qi .ico{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;}
.msg-quick .qi .ico.c1{background:linear-gradient(135deg,#ff5a8a,#b66dff);}
.msg-quick .qi .ico.c2{background:linear-gradient(135deg,#7c5aff,#4ade80);}
.msg-quick .qi .ico.c3{background:linear-gradient(135deg,#ffd75e,#ff9a3c);}
.msg-quick .qi .ico.c4{background:linear-gradient(135deg,#4ade80,#22c55e);}
.msg-quick .qi .lbl{font-size:11px;color:#666;}
.msg-quick .qi .bd{position:absolute;top:-4px;right:14px;}
.chat-list{background:#fff;}
.chat-item{display:flex;align-items:center;padding:12px 18px;gap:12px;border-bottom:1px solid #f5f5f8;}
.chat-item:active{background:#fafafd;}
.chat-item .av-wrap{position:relative;}
.chat-item .av-wrap .online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;background:#4ade80;border:2px solid #fff;border-radius:50%;}
.chat-item .info{flex:1;min-width:0;}
.chat-item .info .row1{display:flex;justify-content:space-between;align-items:center;}
.chat-item .info .name{font-size:15px;font-weight:600;color:#2d2d3a;display:flex;align-items:center;gap:4px;}
.chat-item .info .time{font-size:11px;color:#bbb;}
.chat-item .info .last{font-size:13px;color:#999;margin-top:4px;display:flex;justify-content:space-between;align-items:center;}
.chat-item .info .last span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}

/* === ④ 个人中心 === */
.me-header{padding:18px;background:linear-gradient(135deg,#ff5a8a,#b66dff);color:#fff;position:relative;}
.me-header .top-row{display:flex;align-items:center;gap:14px;}
.me-header .av{width:64px;height:64px;font-size:24px;border:3px solid rgba(255,255,255,.3);}
.me-header .ns{flex:1;}
.me-header .name{font-size:20px;font-weight:800;display:flex;align-items:center;gap:6px;}
.me-header .id{font-size:11px;opacity:.8;margin-top:2px;}
.me-header .sign{font-size:12px;margin-top:6px;opacity:.9;}
.me-header .edit{position:absolute;top:18px;right:18px;padding:5px 12px;background:rgba(255,255,255,.2);border-radius:14px;font-size:11px;color:#fff;}
.me-stats{display:grid;grid-template-columns:repeat(4,1fr);margin-top:18px;text-align:center;}
.me-stats .num{font-size:18px;font-weight:800;}
.me-stats .lbl{font-size:11px;opacity:.85;margin-top:2px;}
.vip-banner{margin:14px;padding:14px;border-radius:14px;background:linear-gradient(135deg,#3a2a52,#1a0d2e);color:#ffd75e;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.vip-banner::after{content:"👑";position:absolute;right:-10px;top:-10px;font-size:80px;opacity:.1;}
.vip-banner .vip-i{font-size:28px;}
.vip-banner .vt{flex:1;}
.vip-banner .vt .t1{font-size:14px;font-weight:700;}
.vip-banner .vt .t2{font-size:11px;opacity:.8;margin-top:2px;}
.vip-banner .vb{padding:6px 14px;background:linear-gradient(135deg,#ffd75e,#ff9a3c);color:#5a3a00;border-radius:14px;font-size:12px;font-weight:700;}
.menu-group{margin:0 14px 14px;background:#fff;border-radius:14px;overflow:hidden;}
.menu-item{display:flex;align-items:center;padding:14px;gap:12px;border-bottom:1px solid #f5f5f8;}
.menu-item:last-child{border-bottom:none;}
.menu-item:active{background:#fafafd;}
.menu-item .ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;}
.menu-item .lbl{flex:1;font-size:14px;color:#2d2d3a;}
.menu-item .rt{font-size:12px;color:#999;}
.menu-item .arr{color:#ccc;font-size:18px;}

/* === ⑤ 个人主页 === */
.profile-page{background:#f5f5f8;height:100%;display:flex;flex-direction:column;overflow:hidden;}
.profile-cover{height:380px;position:relative;color:#fff;flex-shrink:0;}
.profile-cover.av-1{background:linear-gradient(135deg,#ff5a8a,#b66dff);}
.profile-cover.av-2{background:linear-gradient(135deg,#7c5aff,#4ade80);}
.profile-cover.av-3{background:linear-gradient(135deg,#ffd75e,#ff9a3c);}
.profile-cover.av-4{background:linear-gradient(135deg,#ff3b5c,#ffd75e);}
.profile-cover.av-5{background:linear-gradient(135deg,#4ade80,#7c5aff);}
.profile-cover.av-6{background:linear-gradient(135deg,#b66dff,#ff5a8a);}
.profile-cover::after{content:"";position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.5));}
.profile-cover .top{position:absolute;top:48px;left:0;right:0;padding:0 14px;display:flex;justify-content:space-between;align-items:center;z-index:2;}
.profile-cover .ic-btn{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;backdrop-filter:blur(8px);}
.profile-cover .info{position:absolute;bottom:14px;left:18px;right:18px;z-index:2;}
.profile-cover .name{font-size:24px;font-weight:800;display:flex;align-items:center;gap:6px;}
.profile-cover .meta{font-size:12px;margin-top:4px;opacity:.9;display:flex;align-items:center;gap:10px;}
.profile-cover .sign{font-size:13px;margin-top:8px;opacity:.95;}
.profile-content{flex:1;overflow-y:auto;background:#f5f5f8;padding-bottom:80px;}
.profile-content::-webkit-scrollbar{display:none;}
.profile-section{background:#fff;margin:10px 14px;padding:14px;border-radius:14px;}
.profile-section h3{font-size:15px;font-weight:700;margin-bottom:12px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.info-grid .it{display:flex;flex-direction:column;gap:2px;}
.info-grid .it .k{font-size:11px;color:#999;}
.info-grid .it .v{font-size:13px;color:#2d2d3a;font-weight:500;}
.interest-tags{display:flex;flex-wrap:wrap;gap:8px;}
.album-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.album-grid .photo{aspect-ratio:1;border-radius:8px;}
.album-grid .photo.p1{background:linear-gradient(135deg,#ff5a8a,#b66dff);}
.album-grid .photo.p2{background:linear-gradient(135deg,#7c5aff,#4ade80);}
.album-grid .photo.p3{background:linear-gradient(135deg,#ffd75e,#ff9a3c);}
.album-grid .photo.p4{background:linear-gradient(135deg,#ff3b5c,#ffd75e);}
.album-grid .photo.p5{background:linear-gradient(135deg,#4ade80,#7c5aff);}
.album-grid .photo.p6{background:linear-gradient(135deg,#b66dff,#ff5a8a);}
.profile-cta{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;background:#fff;display:flex;gap:8px;box-shadow:0 -4px 16px rgba(0,0,0,.05);padding-bottom:calc(12px + env(safe-area-inset-bottom,0));}
.profile-cta .b{flex:1;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;gap:4px;}
.profile-cta .b.b-gift{background:linear-gradient(135deg,#ffd75e,#ff9a3c);color:#5a3a00;}
.profile-cta .b.b-fav{background:#fef0f5;color:#ff5a8a;}
.profile-cta .b.b-chat{background:linear-gradient(135deg,#ff5a8a,#b66dff);color:#fff;box-shadow:0 6px 18px rgba(255,90,138,.35);flex:2;}

/* === 通用 Toast === */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:99999;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* === 通用 Modal === */
.modal-mask{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;}
.modal-mask.bottom{align-items:flex-end;}
.modal-card{background:#fff;border-radius:18px;width:85%;max-width:320px;overflow:hidden;animation:modalIn .25s;}
.modal-card.full{width:100%;border-radius:18px 18px 0 0;max-width:none;}
@keyframes modalIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}

/* 空状态 */
.empty{padding:60px 20px;text-align:center;color:#bbb;font-size:13px;}
.empty .ei{font-size:48px;opacity:.5;margin-bottom:14px;}

/* === ⑥ 充值 === */
.recharge-page{background:linear-gradient(180deg,#1a0d2e 0%,#2a1a3d 100%);color:#fff;height:100%;overflow-y:auto;}
.recharge-page::-webkit-scrollbar{display:none;}
.recharge-balance{padding:24px 18px;text-align:center;}
.recharge-balance .lbl{font-size:12px;opacity:.7;}
.recharge-balance .num{font-size:36px;font-weight:800;color:#ffd75e;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;}
.recharge-balance .num .di{font-size:24px;}
.first-bonus{margin:0 18px 14px;padding:10px 14px;background:linear-gradient(135deg,rgba(255,215,94,.2),rgba(255,154,60,.1));border:1px solid rgba(255,215,94,.4);border-radius:10px;color:#ffd75e;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
.pkg-grid{padding:0 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.pkg-card{background:rgba(255,255,255,.08);border:1.5px solid transparent;border-radius:12px;padding:14px 8px;text-align:center;position:relative;transition:all .2s;}
.pkg-card.selected{border-color:#ffd75e;background:rgba(255,215,94,.15);}
.pkg-card.hot::before{content:"超值热销";position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff3b5c,#ff5a8a);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;}

// 查找用户：先查 MOCK_USERS（内置真实用户），再查 store.fakeUsers（后台/admin推送的假用户）
// 修复：admin 推送过来的假用户 id 可能是数字或 'f' 开头字符串，findUser 必须能查到对应人，
// 否则会一律回退到 MOCK_USERS[0]（小诗），导致所有会话都显示成"小诗"。
const findUser = id => {
  if(id == null) return MOCK_USERS[0]
  // eq 比较，兼容字符串/数字
  const eq = (a,b)=> a === b || String(a) === String(b)
  let u = MOCK_USERS.find(u=>eq(u.id, id))
  if(u) return u
  // 查 store.fakeUsers（store 可能在脚本前期尚未初始化，用 try 兜底）
  let storeRef = null
  try { storeRef = store } catch(e) {}
  if(storeRef && Array.isArray(storeRef.fakeUsers)){
    const f = storeRef.fakeUsers.find(f=>eq(f.id, id))
    if(f){
      // 把假用户转换成 MOCK_USERS 形状并缓存进 MOCK_USERS，避免重复查询
      const conv = {
        id: f.id,
        name: f.name || '神秘嘉宾',
        av: f.av || f.avatarNo || 1,
        age: f.age || 22,
        city: f.city || '',
        dist: f.dist || '',
        tags: Array.isArray(f.tags) ? f.tags : [],
        sign: f.sign || '',
        online: !!f.online,
        vip: !!f.vip,
        height: f.height || 165,
        weight: f.weight || 50,
        job: f.job || '',
        edu: f.edu || '',
        home: f.home || f.hometown || '',
        love: f.love || f.loveStatus || '单身'
      }
      MOCK_USERS.push(conv)
      return conv
    }
  }
  return MOCK_USERS[0]
}

const glm = {
  async chat(messages, opts={}){
    const key = opts.key || store.csConfig.aiKey
    if(!key) throw new Error('未配置 API Key')
    const res = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({
        model: opts.model || 'glm-4-flash',
        messages,
        temperature: opts.temperature ?? 0.85,
        max_tokens: opts.max_tokens || 200,
      })
    })
    if(!res.ok){
      const err = await res.text().catch(()=>'')
      throw new Error('GLM API '+res.status+': '+err.slice(0,120))
    }
    const data = await res.json()
    return data?.choices?.[0]?.message?.content?.trim() || ''
  }
}

const biz = {
  // ---------- 充值 ----------
  recharge(rmb, diamond){
    // 本地立即扣加，保证体验
    store.diamonds += diamond
    store.transactions.unshift({id:'t'+Date.now(), type:'out', cat:'recharge', t1:`充值 ${diamond}💎`, t2:'刚刚', amt:rmb})
    toast(`充值成功 +${diamond}💎`)
    if(!store.firstRechargeShown){ store.firstRechargeShown = true }

    // 异步同步到后端：根据金额匹配套餐ID（60/300/680/1280/3280/6480 -> 1/2/3/4/5/6）
    if(apiOn()){
      const packageMap = {60:1, 300:2, 680:3, 1280:4, 3280:5, 6480:6}
      const pkgId = packageMap[rmb]
      if(pkgId){
        API.payment.recharge(pkgId, 'wechat').catch(err=>{
          console.warn('[api] recharge failed, kept local:', err.message)
        })
      }
    }
  },

  // ---------- 聊天消息 ----------
  sendChatMsg(chatId, text){
    const chat = store.chats.find(c=>c.id===chatId)
    if(!chat) return false
    let cost = 1
    if(store.user.vip && store.chatFreeRemain>0){
      store.chatFreeRemain--
      cost = 0
    }else if(store.diamonds < 1){
      toast('钻石不足，请充值')
      go('/recharge')
      return false
    }else{
      store.diamonds -= 1
    }
    chat.msgs.push({type:'out', text, time:'刚刚', cost})
    chat.lastMsg = text
    chat.time = '刚刚'

    // 异步同步到后端（仅当 chat.sessionId 已绑定后端会话时）
    if(apiOn() && chat.sessionId){
      API.chat.sendMessage(chat.sessionId, text).catch(err=>{
        console.warn('[api] sendMessage failed, kept local:', err.message)
      })
    }

    // 本地模拟回复（无后端时维持原体验）
    if(!apiOn() || !chat.sessionId){
      setTimeout(()=>{
        const replies = ['嗯嗯～','你说的对','哈哈～','是这样吗？','听你的','想见你了']
        const r = replies[Math.floor(Math.random()*replies.length)]
        chat.msgs.push({type:'in', text:r, time:'刚刚'})
        chat.lastMsg = r
      }, 1200)
    }
    return true
  },

  // ---------- 赠送礼物 ----------
  sendGift(chatId, gift, num){
    const total = gift.price * num
    if(store.diamonds < total){
      toast('钻石不足，请充值')
      return false
    }
    store.diamonds -= total
    const chat = store.chats.find(c=>c.id===chatId)
    if(chat){
      chat.msgs.push({type:'gift', text:gift.name+(num>1?` ×${num}`:''), em:gift.em, price:total, from:'me'})
      chat.lastMsg = `[礼物] ${gift.name} ×${num}`
      chat.time = '刚刚'
    }
    toast(`已送出 ${gift.name} ×${num}`)

    // 异步同步：将本地 gift.id 映射为后端 giftId（1-12按顺序对应）
    if(apiOn() && chat && chat.peerUserId && gift.backendId){
      API.gift.send(chat.peerUserId, gift.backendId, num, chat.sessionId).catch(err=>{
        console.warn('[api] sendGift failed, kept local:', err.message)
      })
    }
    return true
  },

        gender: data.gender === '男' ? 'M' : 'F',
        age: data.age,
        city: data.city,
        height: data.height,
        job: data.job,
        sign: data.sign,
        tags: data.tags ? JSON.stringify(data.tags) : null
      }).catch(err=>{
        console.warn('[api] updateProfile failed:', err.message)
      })
    }
  },

  // ---------- 登录 ----------
  login(){
    store.loggedIn = true
    toast('登录成功')
  },

  // ---------- 真实后端登录（手机+验证码） ----------
  loginByApi(phone, code){
    if(!apiOn()) return Promise.reject(new Error('后端未启用'))
    return API.auth.login(phone, code).then(data=>{
      store.loggedIn = true
      if(data){
        if(data.nickname) store.user.name = data.nickname
        if(data.diamonds !== undefined) store.diamonds = data.diamonds
        if(data.isVip) store.user.vip = true
        if(data.onboarded) store.onboarded = true
      }
      toast('登录成功')
      // 登录后建立 WebSocket
      try { API.ws.connect() } catch(e) {}
      return data
    })
  },

  // ---------- 发送验证码 ----------
  sendCode(phone){
    if(!apiOn()) { toast('验证码已发送（演示）'); return Promise.resolve() }
    return API.auth.sendCode(phone).then(()=>{
      toast('验证码已发送（演示验证码：123456）')
    }).catch(err=>{
      toast('发送失败：'+err.message+'，演示验证码：123456')
    })
  },

  // ---------- 退出登录 ----------
  logout(){
    if(apiOn()) { try { API.auth.logout() } catch(e){} try { API.ws.disconnect() } catch(e){} }
    Object.assign(store, JSON.parse(JSON.stringify(DEFAULT_STORE)))
    toast('已退出登录')
  }
}

// ===== WebSocket 推送：收到新消息时插入到对应会话 =====
if(apiOn()){
  API.ws.on(function(msg){
    if(!msg) return
    if(msg.type === 'new_message' && msg.sessionId){
      const chat = store.chats.find(c=>c.sessionId === msg.sessionId)
      if(chat){
        chat.msgs.push({type:'in', text:msg.content || '', time:'刚刚'})
        chat.lastMsg = msg.content || ''
        chat.time = '刚刚'
        chat.unread = (chat.unread||0) + 1
      }
    }else if(msg.type === 'new_gift'){
      toast(`收到 ${msg.giftIcon||'🎁'} ${msg.giftName||'礼物'} ×${msg.quantity||1}`)
    }
  })
  // 若已登录则立即连接
  if(API.auth.isLoggedIn()) { try { API.ws.connect() } catch(e){} }
}

const PageLogin = {
  components:{StatusBar},
  setup(){
    const phone = ref('')
    const code = ref('')
    const agreed = ref(true)
    const cd = ref(0)
    const loading = ref(false)
    const sendCode = ()=>{
      if(!/^1\d{10}$/.test(phone.value)){ toast('请输入正确手机号'); return }
      cd.value = 60
      const t = setInterval(()=>{ cd.value--; if(cd.value<=0) clearInterval(t) },1000)
      // 调后端，失败回落本地提示
      if(apiOn()){
        biz.sendCode(phone.value)
      }else{
        toast('验证码已发送（演示：123456）')
      }
    }
    const doLogin = ()=>{
      if(!agreed.value){ toast('请同意用户协议'); return }
      if(!/^1\d{10}$/.test(phone.value)){ toast('请输入正确手机号'); return }
      if(!code.value){ toast('请输入验证码'); return }

      const afterLogin = ()=>{
        if(!store.onboarded) go('/onboard')
        else go('/discover')
      }

      if(apiOn()){
        loading.value = true
        biz.loginByApi(phone.value, code.value).then(()=>{
          loading.value = false
          afterLogin()
        }).catch(err=>{
          loading.value = false
          // 后端失败 => 回落本地登录
          console.warn('[api] login failed, fallback local:', err.message)
          toast('后端登录失败：'+err.message+'，已使用本地模式')
          biz.login()
          afterLogin()
        })
      }else{
        biz.login()
        afterLogin()
      }
    }
    return {phone,code,agreed,cd,loading,sendCode,doLogin}
  },
  template:`<div class="screen">
    <status-bar />
    <div class="login-page">

const PageChat = {

  setup(){
    const route = computed(()=>parseRoute(currentRoute.value))
    const chat = computed(()=>store.chats.find(c=>c.id===route.value.param) || store.chats[0] || {id:'',uid:'',msgs:[],lastMsg:'',time:''})
    const user = computed(()=>findUser(chat.value && chat.value.uid))
    const txt = ref('')
    const aiLoading = ref(false)
    const aiSuggest = ref('')
    const tools = [
      {ic:'🎁',lbl:'礼物',act:()=>uiState.giftPanel=true},
      {ic:'📷',lbl:'照片',act:()=>toast('调起相机')},
      {ic:'📞',lbl:'视频',act:()=>go('/call/'+chat.value.uid)},
      {ic:'📍',lbl:'位置',act:()=>toast('发送位置')},
      {ic:'🧧',lbl:'红包',act:()=>toast('打开红包')},
    ]
    const send = ()=>{
      if(!txt.value.trim()) return
      const ok = biz.sendChatMsg(chat.value.id, txt.value)
      if(ok){ txt.value=''; aiSuggest.value='' }
    }
    const goToRecharge = ()=>go('/recharge')
    const askAI = async ()=>{
      if(aiLoading.value) return
      if(!store.csConfig.aiKey){ toast('未配置 AI Key（请在后台设置）'); return }
      aiLoading.value = true
      aiSuggest.value = ''
      try{
        const last5 = chat.value.msgs.slice(-6).filter(m=>m.type==='in'||m.type==='out')
        const dialog = last5.map(m=>({
          role: m.type==='in'?'user':'assistant',
          content: m.text
        }))
        const sys = `你是一位男性的恋爱沟通教练。对方（${user.value.name}, ${user.value.age}岁, ${user.value.city}, ${user.value.sign}）最近发来消息。请用第一人称（我）给出一个自然、有趣、不油腻、30字以内的回复，让对话更轻松推进。只输出回复本身，不要解释。`
        const txt2 = await glm.chat([
          {role:'system', content:sys},
          ...dialog
        ])
        aiSuggest.value = txt2
      }catch(e){ toast('AI出错: '+e.message) }
      aiLoading.value = false
    }
    const useAI = ()=>{ txt.value = aiSuggest.value; aiSuggest.value='' }
    return {chat,user,txt,tools,send,store,goToRecharge,askAI,useAI,aiLoading,aiSuggest,back}
  },

const PageCall = {
  components:{StatusBar},
  setup(){
    const route = computed(()=>parseRoute(currentRoute.value))
    const user = computed(()=>findUser(route.value.param))
    const sec = ref(0)
    const min = computed(()=>Math.floor(sec.value/60))
    const remainMin = computed(()=>Math.floor(store.diamonds / (store.user.vip?5:6)))
    let timer
    const fmt = (s)=>{
      const m = Math.floor(s/60), ss = s%60
      return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0')
    }
    const rate = computed(()=>store.user.vip?5:6)
    onMounted(()=>{
      timer = setInterval(()=>{
        sec.value++
        if(sec.value%60===0){
          const r = biz.callMinute(user.value.id)
          if(!r){ toast('钻石不足，通话结束'); hangup() }
        }
      },1000)
    })
    const hangup = ()=>{
      clearInterval(timer)
      toast('通话结束，时长 '+fmt(sec.value))
      back()
    }
    return {user,sec,min,fmt,rate,remainMin,store,hangup,go}
  },
  template:`<div class="screen">
    <div class="call-page">
      <div class="call-bg" :class="'av-'+user.av">{{user.name[0]}}</div>
      <div class="call-self">我</div>
      <div class="call-top">
        <div class="ct-l">
          <div class="nm">{{user.name}}</div>
          <div class="tm">● {{fmt(sec)}}</div>
        </div>
        <div class="ct-r">💎 {{rate}}/分</div>
      </div>
      <div v-if="remainMin<10" class="call-warning">⚠️ 余额仅剩 {{remainMin}} 分钟，请及时充值</div>

            <div class="n">{{findUser(f.uid).name}} <span v-if="findUser(f.uid).vip" class="tag vip" style="font-size:9px;padding:1px 5px;">VIP</span></div>
            <div class="m">{{f.time}} · {{findUser(f.uid).city}}</div>
          </div>
          <div class="fb">关注</div>
        </div>
        <div class="fc-text">{{f.text}}</div>
        <div v-if="f.imgs.length" class="fc-img-grid">
          <div v-for="(p,i) in f.imgs" :key="i" class="fc-img" :class="p"></div>
        </div>
        <div class="fc-tags">
          <span v-for="t in f.tags" :key="t" class="tag purple">{{t}}</span>
        </div>
        <div class="fc-tools">
          <div class="ft" @click="like(f)">❤ {{f.likes}}</div>
          <div class="ft">💬 {{f.comments}}</div>
          <div class="ft" style="color:#ff9a3c" @click="sendGift(f.uid)">🎁 送礼</div>
          <div class="ft">↗ 分享</div>
        </div>
      </div>
    </div>
    <tab-bar />
  </div>`
}

/* ===================== 根组件 + 路由分发 ===================== */
const App = {
  components:{
    PageLogin, PageOnboard, PageDiscover, PageMessages, PageMe, PageUser,
    PageFeed, PageChat, PageRecharge, PageWallet, PageWithdraw, PageVip,
    PageCall, PageAuth, PageInvite, PageInviteRank, PageInviteStats,
    PageLanding, PageSettings, GiftPanel, PosterModal, FirstRechargeModal,
  },
  setup(){
    const ROUTES = {
      '/login': 'PageLogin',
      '/onboard': 'PageOnboard',
      '/discover': 'PageDiscover',
      '/messages': 'PageMessages',
      '/me': 'PageMe',
      '/user': 'PageUser',
      '/feed': 'PageFeed',
      '/chat': 'PageChat',
      '/recharge': 'PageRecharge',
      '/wallet': 'PageWallet',
      '/withdraw': 'PageWithdraw',
      '/vip': 'PageVip',
      '/call': 'PageCall',
      '/auth': 'PageAuth',
      '/invite': 'PageInvite',
      '/landing': 'PageLanding',
      '/settings': 'PageSettings',
    }
    const currentPage = computed(()=>{
      if(currentRoute.value.startsWith('/invite/rank')) return 'PageInviteRank'
      if(currentRoute.value.startsWith('/invite/stats')) return 'PageInviteStats'
      const r = parseRoute(currentRoute.value)
      if(!store.loggedIn && r.path!=='/login' && r.path!=='/landing'){
        setTimeout(()=>go('/login'),0)
        return 'PageLogin'
      }
      if(store.loggedIn && !store.onboarded && r.path!=='/onboard' && r.path!=='/login'){
        setTimeout(()=>go('/onboard'),0)
        return 'PageOnboard'
      }
      return ROUTES[r.path] || 'PageDiscover'
    })
    return {currentPage, uiState}
  },
  template:`<div class="phone-shell">
    <component :is="currentPage" />
    <gift-panel v-if="uiState.giftPanel" />
    <poster-modal v-if="uiState.poster" />
    <first-recharge-modal v-if="uiState.firstRecharge" />
    <div v-if="uiState.toast" class="toast">{{uiState.toast}}</div>
  </div>`
}

createApp(App).mount('#app')

/* ===================== 推送 Worker ===================== */
// 由 admin 配置的 pushRules 驱动；按时段从 fakeUsers 池中挑人，给当前男用户发"打招呼"
const PushWorker = {
  greetings: [
    '你好呀～看你头像感觉好亲切',
    '嗨～在干嘛呢',
    '在吗？刚刷到你～',
    '你好，能聊聊吗？',
    '哈喽～看了你的资料感觉很合得来诶',
    '突然好想找人聊聊天',
    '看你也在线，打个招呼～',
    '感觉我们好像挺投缘的',
  ],
  inTimeSlot(){
    if(!store.pushRules.enabled) return null
    const now = new Date()
    const hm = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')
    return store.pushRules.timeSlots.find(s=>hm>=s.start && hm<=s.end) || null
  },
  pickFakeUser(){
    if(!store.fakeUsers.length) return null
    // 过滤掉冷却中的
    const now = Date.now()
    const cooldown = (store.pushRules.cooldownMin||30) * 60000
    const eligible = store.fakeUsers.filter(fu=>{
      const last = store.pushLog.filter(p=>p.fakeUid===fu.id && p.toUid===store.user.id).pop()
      return !last || (now - last.ts) > cooldown
    })
    if(!eligible.length) return null
    return eligible[Math.floor(Math.random()*eligible.length)]
  },
  pushedThisSlot(slot){
    const today = new Date().toDateString()
    return store.pushLog.filter(p=>{
      const d = new Date(p.ts)
      return d.toDateString()===today && p.slot===slot.start && p.toUid===store.user.id
    }).length
  },
  trigger(){
    if(!store.loggedIn) return
    const slot = this.inTimeSlot()
    if(!slot) return
    if(this.pushedThisSlot(slot) >= slot.maxPer) return
    const fu = this.pickFakeUser()
    if(!fu) return
    const greet = this.greetings[Math.floor(Math.random()*this.greetings.length)]
    // 找/建会话
    let chat = store.chats.find(c=>c.uid===fu.id)
    if(!chat){
      chat = {id:'c'+Date.now()+Math.floor(Math.random()*999), uid:fu.id, lastMsg:'', time:'刚刚', unread:0, msgs:[
        {type:'sys', text:'TA向你发起了打招呼'}
      ]}
      store.chats.unshift(chat)
    }
    chat.msgs.push({type:'in', text:greet, time:'刚刚'})
    chat.lastMsg = greet
    chat.time = '刚刚'
    chat.unread = (chat.unread||0) + 1
    store.pushLog.push({ts:Date.now(), fakeUid:fu.id, toUid:store.user.id, slot:slot.start, opened:false, replied:false})
    store.adminAnalytics.pushed = (store.adminAnalytics.pushed||0) + 1
    // 全局 fakeUsers 池没有真实头像，注入到 MOCK_USERS 以便其它页面渲染
    if(!MOCK_USERS.find(u=>u.id===fu.id)) MOCK_USERS.push(fu)
    if(currentRoute.value !== '/messages' && currentRoute.value !== '/chat/'+chat.id){
      toast('💌 '+fu.name+' 向你打招呼')
    }
  },
  start(){
    // 1-3 分钟检查一次时段
    this._t = setInterval(()=>this.trigger(), 60000 + Math.random()*120000)
    // 启动后 8s 触发一次（演示用）
    setTimeout(()=>this.trigger(), 8000)
  }
}
PushWorker.start()
