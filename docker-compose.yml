# ✨ Starluck · 生产环境完整部署
#
# 启动：docker compose up -d
# 停止：docker compose down
# 日志：docker compose logs -f app
#
# 服务：app(8080) + MySQL(3306) + Redis(6379)
# 内存：2C4G 服务器专用优化配置

version: "3.8"

services:
  # ========== MySQL 8.0 ==========
  mysql:
    image: mysql:8.0.33
    container_name: starluck-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Starluck@2026!Root
      MYSQL_DATABASE: starluck
      MYSQL_USER: starluck
      MYSQL_PASSWORD: Starluck@2026!App
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./starluck-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      # 2C4G 优化
      - --innodb_buffer_pool_size=384M
      - --innodb_log_buffer_size=16M
      - --max_allowed_packet=16M
      - --performance_schema=OFF
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis 7 ==========
  redis:
    image: redis:7.2-alpine
    container_name: starluck-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --save 900 1
      - --save 300 10
      - --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ========== Starluck Spring Boot ==========
  app:
    build:
      context: ./starluck-server
      dockerfile: Dockerfile
    image: starluck-server:latest
    container_name: starluck-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Spring 激活 prod 配置
      SPRING_PROFILES_ACTIVE: prod
      # MySQL（docker-compose 内部网络 DNS）
      MYSQL_PASSWORD: Starluck@2026!App
      # JWT 生产密钥（部署时替换为自己生成的随机字符串）
      JWT_SECRET: Starluck-Prod-JWT-Secret-2026-ChangeMe
      # Redis 密码（当前无）
      REDIS_PASSWORD: ""
      # 应用配置
      TZ: Asia/Shanghai
      # GLM AI 配置（部署时替换为实际 Key）
      GLM_API_KEY: ${GLM_API_KEY:-}
    volumes:
      - uploads:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
  redis-data:
  uploads:
